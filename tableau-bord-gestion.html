<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de Bord de Gestion - DGDDI</title>
  
  <!-- Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/utility/icons/icons.min.css" rel="stylesheet">
  
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  
  <style>
    @font-face {
  font-family: 'Marianne';
  src: url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/fonts/Marianne-Light.woff2') format('woff2');
  font-weight: 300; font-style: normal;
}
@font-face {
  font-family: 'Marianne';
  src: url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/fonts/Marianne-Regular.woff2') format('woff2');
  font-weight: 400; font-style: normal;
}
@font-face {
  font-family: 'Marianne';
  src: url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/fonts/Marianne-Medium.woff2') format('woff2');
  font-weight: 500; font-style: normal;
}
@font-face {
  font-family: 'Marianne';
  src: url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/fonts/Marianne-Bold.woff2') format('woff2');
  font-weight: 700; font-style: normal;
}
@font-face {
  font-family: 'Marianne';
  src: url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/fonts/Marianne-ExtraBold.woff2') format('woff2');
  font-weight: 800; font-style: normal;
}

    :root {
      --rep: #002F6C;
      --rep2: #1351A8;
      --rep-pale: #E6ECF8;
      --rouge: #B52020;
      --vert: #1A6B3C;
      --orange: #C05A00;
      --jaune: #8A6800;
      --gris1: #1E2D3D;
      --gris2: #4A5A6A;
      --gris3: #8A9BAA;
      --gris4: #EEF2F7;
      --blanc: #FFFFFF;
      --bord: #CDD6E4;
      --shadow: 0 2px 8px rgba(0,30,80,.10);
      --shadow-lg: 0 8px 32px rgba(0,20,70,.22);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 13px; }
    body {
      font-family: 'Marianne', sans-serif;
      background: #F2F5FA;
      color: var(--gris1);
      line-height: 1.5;
      padding: 20px;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
    }

    /* ══════════════════════════════════ */
    /* HEADER */
    /* ══════════════════════════════════ */
    .fiche-header {
      background: var(--blanc);
      border-radius: 12px;
      padding: 24px 32px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .fiche-header-logo img {
      height: 80px;
      width: auto;
      display: block;
    }

    .fiche-header-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fiche-header-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--rep);
      letter-spacing: -0.5px;
    }

    .fiche-header-subtitle {
      font-size: 15px;
      color: var(--gris2);
      font-weight: 500;
    }

    /* ══════════════════════════════════ */
    /* SECTIONS */
    /* ══════════════════════════════════ */
    .section {
      background: var(--blanc);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--gris4);
    }

    .section-icon {
      font-size: 32px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--rep-pale);
      border-radius: 10px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--gris1);
    }

    /* ══════════════════════════════════ */
    /* TABLEAUX */
    /* ══════════════════════════════════ */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      background: var(--gris4);
      padding: 12px 10px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--gris2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--bord);
    }

    thead th:first-child {
      border-top-left-radius: 8px;
    }

    thead th:last-child {
      border-top-right-radius: 8px;
    }

    tbody tr {
      border-bottom: 1px solid var(--gris4);
      transition: background-color 0.15s;
    }

    tbody tr:hover {
      background-color: #FAFBFC;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody td {
      padding: 12px 10px;
      color: var(--gris1);
    }

    tbody td:first-child {
      font-weight: 600;
      color: var(--gris1);
    }

    .number {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ══════════════════════════════════ */
    /* BADGES */
    /* ══════════════════════════════════ */
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      margin-right: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-dg { background: var(--rep-pale); color: var(--rep); }
    .badge-di { background: #D1FAE5; color: var(--vert); }
    .badge-dr { background: #E0E7FF; color: #3730A3; }
    .badge-scn { background: #FEF3C7; color: var(--jaune); }

    /* ══════════════════════════════════ */
    /* BARRES DE RÉPARTITION */
    /* ══════════════════════════════════ */
    .percent-bar-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .percent-bar {
      flex: 1;
      height: 24px;
      background: var(--gris4);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
    }

    .bar-segment {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      transition: all 0.3s;
    }

    .bar-transport { background: var(--rep2); }
    .bar-hebergement { background: var(--vert); }
    .bar-repas { background: var(--orange); }

    .percent-label {
      font-size: 12px;
      color: var(--gris2);
      min-width: 80px;
      text-align: right;
      font-weight: 600;
    }

    /* ══════════════════════════════════ */
    /* LIGNES SPÉCIALES */
    /* ══════════════════════════════════ */
    .row-total {
      font-weight: 700;
      background: var(--gris4) !important;
      border-top: 2px solid var(--bord) !important;
    }

    .row-indent {
      padding-left: 32px !important;
    }

    .row-di-outremer {
      background: #ECFDF5 !important;
      font-weight: 600;
    }

    /* ══════════════════════════════════ */
    /* LOADING / ERROR */
    /* ══════════════════════════════════ */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--gris2);
      font-size: 16px;
    }

    .error {
      background: #FEE;
      color: var(--rouge);
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid var(--rouge);
      font-weight: 500;
    }

    /* ══════════════════════════════════ */
    /* RESPONSIVE */
    /* ══════════════════════════════════ */
    @media (max-width: 768px) {
      .fiche-header {
        flex-direction: column;
        text-align: center;
      }

      table {
        font-size: 11px;
      }

      thead th, tbody td {
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="fiche-header">
      <div class="fiche-header-logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/1d/Logo_des_Douanes_Fran%C3%A7aises.svg" 
             alt="Logo des Douanes Françaises">
      </div>
      <div class="fiche-header-content">
        <h1 class="fiche-header-title">Tableau de Bord de Gestion</h1>
        <div class="fiche-header-subtitle">Direction Générale des Douanes et Droits Indirects • Synthèse <span id="anneeAffichee">2024</span></div>
      </div>
    </div>

    <div id="loading" class="loading">Chargement des données...</div>
    <div id="content" style="display: none;"></div>
  </div>

  <script>
    let ANNEE = 2024;
    let consolidationData = [];
    let structuresData = [];
    let consolidationNationaleData = null;

    async function init() {
      try {
        await grist.ready();
        
        // Charger les données
        const [consolidationStructure, structures, consolidationNationale] = await Promise.all([
          grist.docApi.fetchTable('Consolidation_Structure'),
          grist.docApi.fetchTable('Structures'),
          grist.docApi.fetchTable('Consolidation')
        ]);
        
        consolidationData = consolidationStructure;
        structuresData = structures;
        consolidationNationaleData = consolidationNationale;
        
        console.log('✅ Données chargées:', {
          consolidation_structure: consolidationStructure.id.length,
          structures: structures.id.length,
          consolidation_nationale: consolidationNationale.id.length
        });
        
        // 🔍 DIAGNOSTIC : Vérifier les colonnes véhicules
        console.log('\n🔍 DIAGNOSTIC COLONNES VÉHICULES:');
        console.log('Colonnes disponibles dans Consolidation_Structure:', Object.keys(consolidationStructure));
        console.log('Cout_Fonctionnement_Par_Vehicule existe?', consolidationStructure.hasOwnProperty('Cout_Fonctionnement_Par_Vehicule'));
        console.log('Ratio_Vehicule_SU existe?', consolidationStructure.hasOwnProperty('Ratio_Vehicule_SU'));
        
        // Test sur première ligne
        if (consolidationStructure.id.length > 0) {
          const idx = 0;
          console.log('\nValeurs ligne 0:');
          console.log('  Nb_Vehicules =', consolidationStructure.Nb_Vehicules?.[idx]);
          console.log('  Budget_Vehicules =', consolidationStructure.Budget_Vehicules?.[idx]);
          console.log('  Effectif_SU =', consolidationStructure.Effectif_SU?.[idx]);
          console.log('  Ratio_Vehicule_SU =', consolidationStructure.Ratio_Vehicule_SU?.[idx]);
          console.log('  Cout_Fonctionnement_Par_Vehicule =', consolidationStructure.Cout_Fonctionnement_Par_Vehicule?.[idx]);
        }
        
        // 🔍 DIAGNOSTIC SPÉCIFIQUE DG
        console.log('\n🔍 RECHERCHE STRUCTURE DG:');
        for (let i = 0; i < consolidationStructure.Structure.length; i++) {
          const structId = consolidationStructure.Structure[i];
          const structIdx = structures.id.findIndex(id => id === structId);
          if (structIdx >= 0) {
            const sigle = structures.Sigle?.[structIdx];
            if (sigle && (sigle.includes('DGDDI') || sigle === 'DG')) {
              console.log(`\n📍 TROUVÉ: ${sigle} - Année ${consolidationStructure.Annee[i]}`);
              console.log('  Nb_Vehicules =', consolidationStructure.Nb_Vehicules?.[i]);
              console.log('  Budget_Vehicules =', consolidationStructure.Budget_Vehicules?.[i]);
              console.log('  Cout_Fonctionnement_Par_Vehicule =', consolidationStructure.Cout_Fonctionnement_Par_Vehicule?.[i]);
              console.log('  Calcul manuel (Budget/Nb) =', consolidationStructure.Budget_Vehicules?.[i] / consolidationStructure.Nb_Vehicules?.[i]);
            }
          }
        }
        
        // Détecter la dernière année depuis Consolidation_Structure
        const annees = [...new Set(consolidationStructure.Annee.filter(a => a > 0))];
        ANNEE = Math.max(...annees);
        document.getElementById('anneeAffichee').textContent = ANNEE;
        
        render();
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        
      } catch (error) {
        console.error('❌ Erreur initialisation:', error);
        document.getElementById('loading').innerHTML = 
          `<div class="error">Erreur de chargement : ${error.message}<br><br>Vérifiez que la table Consolidation_Structure existe et est remplie.</div>`;
      }
    }

    function getMoyennes(annee) {
      if (!consolidationNationaleData) return null;
      
      // Chercher la ligne Perimetre='National' pour l'année donnée
      for (let i = 0; i < consolidationNationaleData.Perimetre.length; i++) {
        if (consolidationNationaleData.Perimetre[i] === 'National' && consolidationNationaleData.Annee[i] === annee) {
          return {
            ms_par_agent: consolidationNationaleData.Moyenne_MS_Par_Agent?.[i] || 0,
            age_moyen: consolidationNationaleData.Age_Moyen_Global?.[i] || 0,
            // TODO: Ajouter colonne Moyenne_Cout_Fonctionnement_Par_Vehicule dans table Consolidation (Grist)
            // Pour l'instant, utilise la moyenne existante ou calcul temporaire
            cout_fonct_vehicule: consolidationNationaleData.Moyenne_Cout_Fonctionnement_Par_Vehicule?.[i] || 
              (consolidationNationaleData.Total_Vehicules?.[i] > 0 
                ? consolidationNationaleData.Total_Budget_Vehicules?.[i] / consolidationNationaleData.Total_Vehicules?.[i] 
                : 0),
            // TODO: Ajouter colonne Moyenne_Ratio_Vehicule_SU dans table Consolidation (Grist)
            ratio_vehicule_su: consolidationNationaleData.Moyenne_Ratio_Vehicule_SU?.[i] || 
              (consolidationNationaleData.Total_Effectif_SU?.[i] > 0 
                ? consolidationNationaleData.Total_Vehicules?.[i] / consolidationNationaleData.Total_Effectif_SU?.[i] 
                : 0),
            frais_par_agent: consolidationNationaleData.Moyenne_Frais_Par_Agent?.[i] || 0,
            it_par_agent: consolidationNationaleData.Moyenne_Budget_IT_Par_Agent?.[i] || 0,
            it_par_agent_lisse: consolidationNationaleData.Moy_Budget_IT_Moyen_Par_Agent_4ans?.[i] || 0
          };
        }
      }
      return null;
    }

    function getConsolidation(structureId, annee) {
      for (let i = 0; i < consolidationData.Structure.length; i++) {
        if (consolidationData.Structure[i] === structureId && consolidationData.Annee[i] === annee) {
          // ✅ CORRECTION : Utiliser systématiquement les colonnes Grist calculées
          // au lieu de recalculer en JavaScript (source unique de vérité)
          return {
            effectif_total: Number(consolidationData.Effectif_Total?.[i]) || 0,
            effectif_su: Number(consolidationData.Effectif_SU?.[i]) || 0,
            effectif_agco: Number(consolidationData.Effectif_AGCO?.[i]) || 0,
            effectif_autres: Number(consolidationData.Effectif_Autres?.[i]) || 0,
            age_moyen: Number(consolidationData.Age_Moyen?.[i]) || 0,
            masse_salariale: Number(consolidationData.Masse_Salariale?.[i]) || 0,
            ms_par_agent: Number(consolidationData.MS_Par_Agent?.[i]) || 0,
            
            nb_vehicules: Number(consolidationData.Nb_Vehicules?.[i]) || 0,
            nb_vetustes: Number(consolidationData.Nb_Vehicules_Vetustes?.[i]) || 0,
            taux_vetuste: Number(consolidationData.Taux_Vetuste?.[i]) || 0,
            ratio_vehicule_agent: Number(consolidationData.Ratio_Vehicule_Agent?.[i]) || 0,
            ratio_vehicule_su: Number(consolidationData.Ratio_Vehicule_SU?.[i]) || 0,
            budget_vehicules: Number(consolidationData.Budget_Vehicules?.[i]) || 0,
            cout_fonct_vehicule: Number(consolidationData.Cout_Fonctionnement_Par_Vehicule?.[i]) || 0,
            
            transport: Number(consolidationData.Transport?.[i]) || 0,
            hebergement: Number(consolidationData.Hebergement?.[i]) || 0,
            repas: Number(consolidationData.Repas?.[i]) || 0,
            formation: Number(consolidationData.Formation?.[i]) || 0,
            autres_missions: Number(consolidationData.Autres_Missions?.[i]) || 0,
            frais_par_agent: Number(consolidationData.Frais_Mission_Par_Agent?.[i]) || 0,
            
            postes_fixes: Number(consolidationData.Postes_Fixes?.[i]) || 0,
            portables: Number(consolidationData.Portables?.[i]) || 0,
            nb_postes_total: Number(consolidationData.Nb_Postes_Total?.[i]) || 0,
            taux_equipement: Number(consolidationData.Taux_Equipement?.[i]) || 0,
            budget_it: Number(consolidationData.Budget_IT_CP?.[i]) || 0,
            budget_it_4ans: Number(consolidationData.Budget_IT_4ans?.[i]) || 0,
            it_par_agent: Number(consolidationData.IT_Par_Agent?.[i]) || 0,
            it_par_agent_lisse: Number(consolidationData.IT_Par_Agent_Lisse?.[i]) || 0
          };
        }
      }
      return null;
    }

    function getStructuresAffichees() {
      const structures = [];
      
      for (let i = 0; i < structuresData.id.length; i++) {
        const typeAffichage = structuresData.Type_Affichage?.[i];
        
        // Filtrer selon Type_Affichage (incluant 'DG' maintenant!)
        if (['DG', 'DI_Hexagone', 'DI_Outremer', 'DR_Antilles', 'DR_Outremer', 'SCN'].includes(typeAffichage)) {
          const structId = structuresData.id[i];
          const conso = getConsolidation(structId, ANNEE);
          
          if (conso) {
            structures.push({
              id: structId,
              sigle: structuresData.Sigle?.[i] || '',
              nom: structuresData.Nom?.[i] || '',
              type: structuresData.Type?.[i] || '',
              typeAffichage: typeAffichage,
              parent: structuresData.Parent?.[i],
              ...conso
            });
          }
        }
      }
      
      // Trier : DG > DI > DR > SCN
      structures.sort((a, b) => {
        const order = {
          'DG': 0,
          'DI_Hexagone': 1,
          'DI_Outremer': 1,
          'DR_Antilles': 2,
          'DR_Outremer': 2,
          'SCN': 3
        };
        
        const orderA = order[a.typeAffichage] || 99;
        const orderB = order[b.typeAffichage] || 99;
        
        if (orderA !== orderB) return orderA - orderB;
        return (a.sigle || '').localeCompare(b.sigle || '');
      });
      
      console.log('📊 Structures affichées:', structures.length, structures.map(s => s.sigle));
      return structures;
    }

    function getBadgeClass(typeAffichage) {
      if (typeAffichage === 'DG') return 'badge-dg';
      if (typeAffichage.startsWith('DI')) return 'badge-di';
      if (typeAffichage.startsWith('DR')) return 'badge-dr';
      if (typeAffichage === 'SCN') return 'badge-scn';
      return 'badge-di';
    }

    function getBadgeLabel(typeAffichage, type) {
      if (typeAffichage === 'DG') return 'DG';
      if (typeAffichage === 'DI_Outremer') return 'DI';
      if (typeAffichage === 'DI_Hexagone') return 'DI';
      if (typeAffichage === 'DR_Antilles') return 'DR';
      if (typeAffichage === 'DR_Outremer') return 'DR';
      return type;
    }

    function formatNumber(num) {
      if (!num && num !== 0) return '—';
      return Math.round(num).toLocaleString('fr-FR');
    }

    function formatMilliers(num) {
      if (!num && num !== 0) return '—';
      return (num / 1000).toFixed(0);
    }

    function formatEuro(num) {
      if (!num && num !== 0) return '—';
      return Math.round(num).toLocaleString('fr-FR') + ' €';
    }

    function formatEcartMoyenne(valeur, moyenne) {
      if (!moyenne || moyenne === 0) return '';
      const ecart = ((valeur - moyenne) / moyenne * 100);
      const signe = ecart > 0 ? '+' : '';
      const couleur = Math.abs(ecart) < 5 ? 'var(--gris3)' : (ecart > 0 ? 'var(--rouge)' : 'var(--vert)');
      return `<span style="font-size: 10px; color: ${couleur}; margin-left: 4px;">(${signe}${ecart.toFixed(1)}%)</span>`;
    }

    function renderPercentBar(transport, hebergement, repas) {
      const total = transport + hebergement + repas;
      if (total === 0) return '<div class="percent-bar"></div><span class="percent-label">—</span>';
      
      const pctTransport = (transport / total * 100).toFixed(1);
      const pctHebergement = (hebergement / total * 100).toFixed(1);
      const pctRepas = (repas / total * 100).toFixed(1);
      
      return `
        <div class="percent-bar">
          ${transport > 0 ? `<div class="bar-segment bar-transport" style="width: ${pctTransport}%">${pctTransport}%</div>` : ''}
          ${hebergement > 0 ? `<div class="bar-segment bar-hebergement" style="width: ${pctHebergement}%">${pctHebergement}%</div>` : ''}
          ${repas > 0 ? `<div class="bar-segment bar-repas" style="width: ${pctRepas}%">${pctRepas}%</div>` : ''}
        </div>
        <span class="percent-label">${formatMilliers(total)} k€</span>
      `;
    }

    function render() {
      const structures = getStructuresAffichees();
      
      if (structures.length === 0) {
        document.getElementById('content').innerHTML = 
          '<div class="error">Aucune structure trouvée. Vérifiez que la table Consolidation_Structure est remplie et que Type_Affichage est défini dans Structures.</div>';
        return;
      }
      
      // Séparer les structures par bloc
      const blocDG = structures.filter(s => s.typeAffichage === 'DG');
      const blocDIMetropole = structures.filter(s => s.typeAffichage === 'DI_Hexagone');
      
      // Bloc Outremer : DI 972 + DR Antilles
      const diOutremer = structures.find(s => s.typeAffichage === 'DI_Outremer');
      const drAntilles = structures.filter(s => s.typeAffichage === 'DR_Antilles');
      const blocOutremer = diOutremer ? [diOutremer, ...drAntilles] : drAntilles;
      
      const blocDROutremer = structures.filter(s => s.typeAffichage === 'DR_Outremer');
      const blocSCN = structures.filter(s => s.typeAffichage === 'SCN');
      
      // ═══════════════════════════════════════════════════════════════
      // CALCULS AGRÉGÉS DYNAMIQUES
      // Ces calculs sont effectués sur les structures affichées à l'écran
      // et ne peuvent pas être précalculés dans Grist car ils dépendent
      // des filtres utilisateur. Les calculs individuels par structure
      // utilisent les colonnes Grist (pas de recalcul).
      // ═══════════════════════════════════════════════════════════════
      
      // Calculer totaux globaux
      const totaux = structures.reduce((acc, s) => ({
        effectif_total: acc.effectif_total + s.effectif_total,
        effectif_su: acc.effectif_su + s.effectif_su,
        effectif_agco: acc.effectif_agco + s.effectif_agco,
        effectif_autres: acc.effectif_autres + s.effectif_autres,
        masse_salariale: acc.masse_salariale + s.masse_salariale,
        sum_age: acc.sum_age + (s.age_moyen * s.effectif_total),
        
        nb_vehicules: acc.nb_vehicules + s.nb_vehicules,
        nb_vetustes: acc.nb_vetustes + s.nb_vetustes,
        budget_vehicules: acc.budget_vehicules + s.budget_vehicules,
        
        transport: acc.transport + s.transport,
        hebergement: acc.hebergement + s.hebergement,
        repas: acc.repas + s.repas,
        formation: acc.formation + s.formation,
        autres_missions: acc.autres_missions + s.autres_missions,
        
        postes_fixes: acc.postes_fixes + s.postes_fixes,
        portables: acc.portables + s.portables,
        budget_it: acc.budget_it + s.budget_it,
        budget_it_4ans: acc.budget_it_4ans + s.budget_it_4ans
      }), {
        effectif_total: 0, effectif_su: 0, effectif_agco: 0, effectif_autres: 0,
        masse_salariale: 0, sum_age: 0,
        nb_vehicules: 0, nb_vetustes: 0, budget_vehicules: 0,
        transport: 0, hebergement: 0, repas: 0, formation: 0, autres_missions: 0,
        postes_fixes: 0, portables: 0, budget_it: 0, budget_it_4ans: 0
      });
      
      totaux.age_moyen = totaux.effectif_total > 0 ? totaux.sum_age / totaux.effectif_total : 0;
      totaux.ms_par_agent = totaux.effectif_total > 0 ? totaux.masse_salariale / totaux.effectif_total : 0;
      totaux.ratio_vehicule_agent = totaux.effectif_total > 0 ? totaux.nb_vehicules / totaux.effectif_total : 0;
      totaux.ratio_vehicule_su = totaux.effectif_su > 0 ? totaux.nb_vehicules / totaux.effectif_su : 0;
      totaux.taux_vetuste = totaux.nb_vehicules > 0 ? (totaux.nb_vetustes / totaux.nb_vehicules * 100) : 0;
      totaux.cout_fonct_vehicule = totaux.nb_vehicules > 0 ? totaux.budget_vehicules / totaux.nb_vehicules : 0;
      totaux.frais_par_agent = totaux.effectif_total > 0 ? (totaux.transport + totaux.hebergement + totaux.repas) / totaux.effectif_total : 0;
      totaux.nb_postes_total = totaux.postes_fixes + totaux.portables;
      totaux.taux_equipement = totaux.effectif_total > 0 ? totaux.nb_postes_total / totaux.effectif_total : 0;
      totaux.it_par_agent = totaux.effectif_total > 0 ? totaux.budget_it / totaux.effectif_total : 0;
      
      console.log('🚗 DEBUG Véhicules - Total:', totaux.nb_vehicules, 'Vétustes:', totaux.nb_vetustes);
      structures.forEach(s => console.log(`  ${s.sigle}: ${s.nb_vehicules} véhicules (${typeof s.nb_vehicules})`));
      totaux.it_par_agent_lisse = totaux.effectif_total > 0 ? totaux.budget_it_4ans / totaux.effectif_total : 0;
      
      const moyennes = getMoyennes(ANNEE);
      
      document.getElementById('content').innerHTML = `
        ${renderRHSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes)}
        ${renderVehiculesSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes)}
        ${renderFraisMissionSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes)}
        ${renderInformatiqueSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes)}
      `;
    }

    function renderStructureRow(s, indent = false, moyennes = null) {
      const badgeClass = getBadgeClass(s.typeAffichage);
      const badgeLabel = getBadgeLabel(s.typeAffichage, s.type);
      const rowClass = indent ? 'row-indent' : '';
      const extraClass = s.typeAffichage === 'DI_Outremer' ? 'row-di-outremer' : '';
      
      // 🔍 DEBUG: Logger les valeurs pour la DG
      if (s.sigle && (s.sigle.includes('DGDDI') || s.sigle === 'DG')) {
        console.log(`\n🔍 AFFICHAGE ${s.sigle}:`);
        console.log('  nb_vehicules =', s.nb_vehicules);
        console.log('  budget_vehicules =', s.budget_vehicules);
        console.log('  cout_fonct_vehicule =', s.cout_fonct_vehicule);
        console.log('  Type de cout_fonct_vehicule =', typeof s.cout_fonct_vehicule);
      }
      
      return {
        rh: `
          <tr class="${rowClass} ${extraClass}">
            <td><span class="badge ${badgeClass}">${badgeLabel}</span>${s.sigle}</td>
            <td class="number">${formatNumber(s.effectif_total)}</td>
            <td class="number">${formatNumber(s.effectif_su)}</td>
            <td class="number">${formatNumber(s.effectif_agco)}</td>
            <td class="number">${formatNumber(s.effectif_autres)}</td>
            <td class="number">${Number(s.age_moyen).toFixed(1)} ans${moyennes ? formatEcartMoyenne(s.age_moyen, moyennes.age_moyen) : ''}</td>
            <td class="number">${formatMilliers(s.masse_salariale)} k€</td>
            <td class="number">${formatEuro(s.ms_par_agent)}${moyennes ? formatEcartMoyenne(s.ms_par_agent, moyennes.ms_par_agent) : ''}</td>
          </tr>
        `,
        vehicules: `
          <tr class="${rowClass} ${extraClass}">
            <td><span class="badge ${badgeClass}">${badgeLabel}</span>${s.sigle}</td>
            <td class="number">${formatNumber(s.nb_vehicules)}</td>
            <td class="number">${formatNumber(s.nb_vetustes)}</td>
            <td class="number">${Number(s.taux_vetuste).toFixed(1)} %</td>
            <td class="number">${Number(s.ratio_vehicule_agent).toFixed(3)}</td>
            <td class="number">${Number(s.ratio_vehicule_su).toFixed(3)}${moyennes ? formatEcartMoyenne(s.ratio_vehicule_su, moyennes.ratio_vehicule_su) : ''}</td>
            <td class="number">${formatEuro(s.cout_fonct_vehicule)}${moyennes ? formatEcartMoyenne(s.cout_fonct_vehicule, moyennes.cout_fonct_vehicule) : ''}</td>
          </tr>
        `,
        missions: `
          <tr class="${rowClass} ${extraClass}">
            <td><span class="badge ${badgeClass}">${badgeLabel}</span>${s.sigle}</td>
            <td>
              <div class="percent-bar-container">
                ${renderPercentBar(s.transport, s.hebergement, s.repas)}
              </div>
            </td>
            <td class="number">${formatMilliers(s.formation)} k€</td>
            <td class="number">${formatMilliers(s.autres_missions)} k€</td>
            <td class="number">${formatEuro(s.frais_par_agent)}${moyennes ? formatEcartMoyenne(s.frais_par_agent, moyennes.frais_par_agent) : ''}</td>
          </tr>
        `,
        it: `
          <tr class="${rowClass} ${extraClass}">
            <td><span class="badge ${badgeClass}">${badgeLabel}</span>${s.sigle}</td>
            <td class="number">${formatNumber(s.postes_fixes)}</td>
            <td class="number">${formatNumber(s.portables)}</td>
            <td class="number">${formatNumber(s.nb_postes_total)}</td>
            <td class="number">${Number(s.taux_equipement).toFixed(3)}</td>
            <td class="number">${formatMilliers(s.budget_it)} k€</td>
            <td class="number">${formatMilliers(s.budget_it_4ans)} k€</td>
            <td class="number">${formatEuro(s.it_par_agent)}${moyennes ? formatEcartMoyenne(s.it_par_agent, moyennes.it_par_agent) : ''}</td>
            <td class="number">${formatEuro(s.it_par_agent_lisse)}${moyennes ? formatEcartMoyenne(s.it_par_agent_lisse, moyennes.it_par_agent_lisse) : ''}</td>
          </tr>
        `
      };
    }

    function renderRHSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes) {
      let rows = '';
      
      // DG
      blocDG.forEach(s => { rows += renderStructureRow(s, false, moyennes).rh; });
      
      // DI Métropole
      blocDIMetropole.forEach(s => { rows += renderStructureRow(s, false, moyennes).rh; });
      
      // Outremer (DI + DR indentées)
      blocOutremer.forEach((s, idx) => {
        const indent = idx > 0; // Indenter les DR seulement
        rows += renderStructureRow(s, indent, moyennes).rh;
      });
      
      // DR Outremer (autres)
      blocDROutremer.forEach(s => { rows += renderStructureRow(s, false, moyennes).rh; });
      
      // SCN
      blocSCN.forEach(s => { rows += renderStructureRow(s, false, moyennes).rh; });
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon">🛃</div>
            <div class="section-title">Ressources Humaines</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th class="number">Effectif Total</th>
                <th class="number">Effectif SU</th>
                <th class="number">Effectif AGCO</th>
                <th class="number">Effectif Autres</th>
                <th class="number">Âge Moyen</th>
                <th class="number">Masse Salariale</th>
                <th class="number">MS / Agent</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr class="row-total">
                <td>TOTAL</td>
                <td class="number">${formatNumber(totaux.effectif_total)}</td>
                <td class="number">${formatNumber(totaux.effectif_su)}</td>
                <td class="number">${formatNumber(totaux.effectif_agco)}</td>
                <td class="number">${formatNumber(totaux.effectif_autres)}</td>
                <td class="number">${Number(totaux.age_moyen).toFixed(1)} ans</td>
                <td class="number">${formatMilliers(totaux.masse_salariale)} k€</td>
                <td class="number">${formatEuro(totaux.ms_par_agent)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function renderVehiculesSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes) {
      let rows = '';
      
      blocDG.forEach(s => { rows += renderStructureRow(s, false, moyennes).vehicules; });
      blocDIMetropole.forEach(s => { rows += renderStructureRow(s, false, moyennes).vehicules; });
      blocOutremer.forEach((s, idx) => { rows += renderStructureRow(s, idx > 0, moyennes).vehicules; });
      blocDROutremer.forEach(s => { rows += renderStructureRow(s, false, moyennes).vehicules; });
      blocSCN.forEach(s => { rows += renderStructureRow(s, false, moyennes).vehicules; });
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon">🚗</div>
            <div class="section-title">Parc Véhicules</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th class="number">Nb Véhicules</th>
                <th class="number">Vétustes</th>
                <th class="number">Taux Vétusté</th>
                <th class="number">Ratio / Agent</th>
                <th class="number">Ratio / Agent SU</th>
                <th class="number">Coût Fonct. / Véh.</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr class="row-total">
                <td>TOTAL</td>
                <td class="number">${formatNumber(totaux.nb_vehicules)}</td>
                <td class="number">${formatNumber(totaux.nb_vetustes)}</td>
                <td class="number">${Number(totaux.taux_vetuste).toFixed(1)} %</td>
                <td class="number">${Number(totaux.ratio_vehicule_agent).toFixed(3)}</td>
                <td class="number">${Number(totaux.ratio_vehicule_su).toFixed(3)}</td>
                <td class="number">${formatEuro(totaux.cout_fonct_vehicule)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function renderFraisMissionSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes) {
      let rows = '';
      
      blocDG.forEach(s => { rows += renderStructureRow(s, false, moyennes).missions; });
      blocDIMetropole.forEach(s => { rows += renderStructureRow(s, false, moyennes).missions; });
      blocOutremer.forEach((s, idx) => { rows += renderStructureRow(s, idx > 0, moyennes).missions; });
      blocDROutremer.forEach(s => { rows += renderStructureRow(s, false, moyennes).missions; });
      blocSCN.forEach(s => { rows += renderStructureRow(s, false, moyennes).missions; });
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon">✈️</div>
            <div class="section-title">Frais de Mission</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th style="width: 35%;">Répartition T/H/R</th>
                <th class="number">Total Formation</th>
                <th class="number">Total Autres Missions</th>
                <th class="number">Frais Moyen / Agent</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr class="row-total">
                <td>TOTAL</td>
                <td>
                  <div class="percent-bar-container">
                    ${renderPercentBar(totaux.transport, totaux.hebergement, totaux.repas)}
                  </div>
                </td>
                <td class="number">${formatMilliers(totaux.formation)} k€</td>
                <td class="number">${formatMilliers(totaux.autres_missions)} k€</td>
                <td class="number">${formatEuro(totaux.frais_par_agent)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function renderInformatiqueSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes) {
      let rows = '';
      
      blocDG.forEach(s => { rows += renderStructureRow(s, false, moyennes).it; });
      blocDIMetropole.forEach(s => { rows += renderStructureRow(s, false, moyennes).it; });
      blocOutremer.forEach((s, idx) => { rows += renderStructureRow(s, idx > 0, moyennes).it; });
      blocDROutremer.forEach(s => { rows += renderStructureRow(s, false, moyennes).it; });
      blocSCN.forEach(s => { rows += renderStructureRow(s, false, moyennes).it; });
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon">💻</div>
            <div class="section-title">Informatique</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th class="number">Postes Fixes</th>
                <th class="number">Portables</th>
                <th class="number">Total Postes</th>
                <th class="number">Taux Équip.</th>
                <th class="number">Budget</th>
                <th class="number">Budget Moy. 4 ans</th>
                <th class="number">Coût / Agent</th>
                <th class="number">Coût / Agent Lissé</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr class="row-total">
                <td>TOTAL</td>
                <td class="number">${formatNumber(totaux.postes_fixes)}</td>
                <td class="number">${formatNumber(totaux.portables)}</td>
                <td class="number">${formatNumber(totaux.nb_postes_total)}</td>
                <td class="number">${Number(totaux.taux_equipement).toFixed(3)}</td>
                <td class="number">${formatMilliers(totaux.budget_it)} k€</td>
                <td class="number">${formatMilliers(totaux.budget_it_4ans)} k€</td>
                <td class="number">${formatEuro(totaux.it_par_agent)}</td>
                <td class="number">${formatEuro(totaux.it_par_agent_lisse)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
