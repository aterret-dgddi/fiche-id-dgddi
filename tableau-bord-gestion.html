<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de Bord de Gestion - DGDDI</title>
  
  <!-- Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/utility/icons/icons.min.css" rel="stylesheet">
  
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    @font-face {
  font-family: 'Marianne';
  src: url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/fonts/Marianne-Light.woff2') format('woff2');
  font-weight: 300; font-style: normal;
}
@font-face {
  font-family: 'Marianne';
  src: url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/fonts/Marianne-Regular.woff2') format('woff2');
  font-weight: 400; font-style: normal;
}
@font-face {
  font-family: 'Marianne';
  src: url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/fonts/Marianne-Medium.woff2') format('woff2');
  font-weight: 500; font-style: normal;
}
@font-face {
  font-family: 'Marianne';
  src: url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/fonts/Marianne-Bold.woff2') format('woff2');
  font-weight: 700; font-style: normal;
}
@font-face {
  font-family: 'Marianne';
  src: url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.11.2/dist/fonts/Marianne-Heavy.woff2') format('woff2');
  font-weight: 800; font-style: normal;
}

    :root {
      --rep: #002F6C;
      --rep2: #1351A8;
      --rep-pale: #E6ECF8;
      --rouge: #B52020;
      --vert: #1A6B3C;
      --orange: #C05A00;
      --jaune: #8A6800;
      --gris1: #1E2D3D;
      --gris2: #4A5A6A;
      --gris3: #8A9BAA;
      --gris4: #EEF2F7;
      --blanc: #FFFFFF;
      --bord: #CDD6E4;
      --shadow: 0 2px 8px rgba(0,30,80,.10);
      --shadow-lg: 0 8px 32px rgba(0,20,70,.22);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 13px; }
    body {
      font-family: 'Marianne', sans-serif;
      background: #F2F5FA;
      color: var(--gris1);
      line-height: 1.5;
      padding: 20px;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
    }

    /* ══════════════════════════════════ */
    /* HEADER */
    /* ══════════════════════════════════ */
    .fiche-header {
      background: var(--blanc);
      border-radius: 12px;
      padding: 24px 32px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .fiche-header-logo img {
      height: 80px;
      width: auto;
      display: block;
    }

    .fiche-header-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fiche-header-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--rep);
      letter-spacing: -0.5px;
    }

    .fiche-header-subtitle {
      font-size: 15px;
      color: var(--gris2);
      font-weight: 500;
    }

    /* ══════════════════════════════════ */
    /* SECTIONS */
    /* ══════════════════════════════════ */
    .section {
      background: var(--blanc);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--gris4);
    }

    .section-icon {
      font-size: 32px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--rep-pale);
      border-radius: 10px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--gris1);
    }

    /* ══════════════════════════════════ */
    /* TABLEAUX */
    /* ══════════════════════════════════ */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      background: var(--gris4);
      padding: 12px 10px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--gris2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--bord);
    }

    thead th:first-child {
      border-top-left-radius: 8px;
    }

    thead th:last-child {
      border-top-right-radius: 8px;
    }

    tbody tr {
      border-bottom: 1px solid var(--gris4);
      transition: background-color 0.15s;
    }

    tbody tr:hover {
      background-color: #FAFBFC;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody td {
      padding: 12px 10px;
      color: var(--gris1);
    }

    tbody td:first-child {
      font-weight: 600;
      color: var(--gris1);
    }

    .number {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ══════════════════════════════════ */
    /* BADGES */
    /* ══════════════════════════════════ */
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      margin-right: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-dg { background: var(--rep-pale); color: var(--rep); }
    .badge-di { background: #D1FAE5; color: var(--vert); }
    .badge-dr { background: #E0E7FF; color: #3730A3; }
    .badge-scn { background: #FEF3C7; color: var(--jaune); }

    /* ══════════════════════════════════ */
    /* BARRES DE RÉPARTITION */
    /* ══════════════════════════════════ */
    .percent-bar-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .percent-bar {
      flex: 1;
      height: 24px;
      background: var(--gris4);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
    }

    .bar-segment {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      transition: all 0.3s;
    }

    .bar-transport { background: var(--rep2); }
    .bar-hebergement { background: var(--vert); }
    .bar-repas { background: var(--orange); }

    .percent-label {
      font-size: 12px;
      color: var(--gris2);
      min-width: 80px;
      text-align: right;
      font-weight: 600;
    }

    /* ══════════════════════════════════ */
    /* LIGNES SPÉCIALES */
    /* ══════════════════════════════════ */
    .row-total {
      font-weight: 700;
      background: var(--gris4) !important;
      border-top: 2px solid var(--bord) !important;
    }

    .row-indent {
      padding-left: 32px !important;
    }

    .row-di-outremer {
      background: #ECFDF5 !important;
      font-weight: 600;
    }

    /* ══════════════════════════════════ */
    /* KPI ÉVOLUTION GLOBALE */
    /* ══════════════════════════════════ */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .kpi-evol-card {
      background: var(--gris4);
      border-radius: 10px;
      padding: 14px 16px 12px;
      border-left: 4px solid var(--rep2);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .kpi-evol-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--gris2);
      margin-bottom: 2px;
    }
    .kpi-evol-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--rep);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .kpi-evol-sub {
      font-size: 10px;
      color: var(--gris2);
      min-height: 14px;
      margin-bottom: 6px;
    }
    .spark-wrap {
      position: relative;
      height: 56px;
      width: 100%;
    }
    .spark-wrap canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* ══════════════════════════════════ */
    /* TABLEAU DÉPLIABLE */
    /* ══════════════════════════════════ */
    .row-parent-di { cursor: pointer; }
    .row-parent-di:hover { background: #F0F4FF !important; }
    .toggle-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px; height: 16px;
      border-radius: 3px;
      background: var(--rep-pale);
      color: var(--rep2);
      font-size: 9px;
      font-weight: 700;
      margin-right: 5px;
      transition: transform 0.18s;
      user-select: none;
      flex-shrink: 0;
      vertical-align: middle;
    }
    .toggle-arrow.open { transform: rotate(90deg); }
    .row-dr-child.hidden { display: none; }
    .row-dr-child td:first-child { padding-left: 40px !important; font-weight: 400; color: var(--gris2); }

    /* ══════════════════════════════════ */
    /* LOADING / ERROR */
    /* ══════════════════════════════════ */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--gris2);
      font-size: 16px;
    }

    .error {
      background: #FEE;
      color: var(--rouge);
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid var(--rouge);
      font-weight: 500;
    }

    /* ══════════════════════════════════ */
    /* RESPONSIVE */
    /* ══════════════════════════════════ */
    @media (max-width: 768px) {
      .fiche-header {
        flex-direction: column;
        text-align: center;
      }

      table {
        font-size: 11px;
      }

      thead th, tbody td {
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="fiche-header">
      <div class="fiche-header-logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/1d/Logo_des_Douanes_Fran%C3%A7aises.svg" 
             alt="Logo des Douanes Françaises">
      </div>
      <div class="fiche-header-content">
        <h1 class="fiche-header-title">Tableau de Bord de Gestion</h1>
        <div class="fiche-header-subtitle">Direction Générale des Douanes et Droits Indirects • Synthèse <span id="anneeAffichee">2024</span></div>
      </div>
    </div>

    <div id="loading" class="loading">Chargement des données...</div>
    <div id="content" style="display: none;"></div>
  </div>

  <script>
    let ANNEE = 2024;
    let consolidationData = [];
    let structuresData = [];
    let consolidationNationaleData = null;
    let communicationData = null;
    let fonctionnementData = null;
    let ANNEES_DISPO = [];
    // État dépliage: "section-structId" => true(ouvert)/false(fermé)
    const expandedState = {};

    // ═══════════════════════════════════════════════════════
    // HELPERS MULTI-ANNÉES pour KPI évolution
    // ═══════════════════════════════════════════════════════

    function getConsolidationAnnee(structureId, annee) {
      // Version allégée : uniquement les champs RH pour les sparklines
      for (let i = 0; i < consolidationData.Structure.length; i++) {
        if (consolidationData.Structure[i] === structureId && consolidationData.Annee[i] === annee) {
          return {
            effectif_total: Number(consolidationData.Effectif_Total?.[i]) || 0,
            age_moyen: Number(consolidationData.Age_Moyen?.[i]) || 0,
            masse_salariale: Number(consolidationData.Masse_Salariale?.[i]) || 0,
          };
        }
      }
      return null;
    }

    function getNationalRow(annee) {
      if (!consolidationNationaleData) return null;
      for (let i = 0; i < consolidationNationaleData.Perimetre.length; i++) {
        if (consolidationNationaleData.Perimetre[i] === 'National'
            && consolidationNationaleData.Annee[i] === annee) return i;
      }
      return null;
    }

    function getTotauxAnnee(annee) {
      // ✅ Lit depuis Consolidation (périmètre National) — source unique de vérité Grist
      const i = getNationalRow(annee);
      if (i === null) return null;
      const d = consolidationNationaleData;
      const etpt = Number(d.Total_Effectif?.[i]) || 0;
      if (etpt === 0) return null;
      return {
        etpt,
        age_moyen: Number(d.Age_Moyen_Global?.[i])      || 0,
        ms:        Number(d.Total_Masse_Salariale?.[i])  || 0,
        ms_agent:  Number(d.Moyenne_MS_Par_Agent?.[i])   || 0,
      };
    }

    // ═══════════════════════════════════════════════════════
    // HELPERS MULTI-ANNÉES pour KPI véhicules
    // ═══════════════════════════════════════════════════════

    function getTotauxVehiculesAnnee(annee) {
      // ✅ Lit depuis Consolidation (périmètre National) — source unique de vérité Grist
      const i = getNationalRow(annee);
      if (i === null) return null;
      const d = consolidationNationaleData;
      const nb = Number(d.Total_Vehicules?.[i]) || 0;
      if (nb === 0) return null;
      return {
        nb,
        nb_vetustes:  Number(d.Total_Vehicules_Vetustes?.[i])         || 0,
        taux_vetuste: Number(d.Taux_Vetuste_Moyen?.[i])               || 0,
        ratio_agent:  Number(d.Ratio_Vehicule_Agent?.[i])             || 0,
        ratio_su:     Number(d.Moy_Ratio_Vehicule_SU?.[i])            || 0,
        cout_fonct:   Number(d.Moy_Cout_Fonctionnement_Par_Vehicule?.[i]) || 0,
      };
    }

    function getTotauxITAnnee(annee) {
      // ✅ Lit depuis Consolidation (périmètre National) — source unique de vérité Grist
      const i = getNationalRow(annee);
      if (i === null) return null;
      const d = consolidationNationaleData;
      const budget = Number(d.Total_Budget_IT?.[i]) || 0;
      const it_par_agent = Number(d.Moyenne_Budget_IT_Par_Agent?.[i]) || 0;
      if (budget === 0 && it_par_agent === 0) return null;
      return {
        budget,
        budget_4ans:    Number(d.Total_Budget_IT_4ans?.[i])              || 0,
        it_par_agent,
        it_par_agent_lisse: Number(d.Moy_Budget_IT_Moyen_Par_Agent_4ans?.[i]) || 0,
      };
    }

    function renderKPIEvolution() {
      const anneesValides = ANNEES_DISPO.filter(a => getTotauxAnnee(a) !== null);
      if (anneesValides.length === 0) return '';

      const sN  = getTotauxAnnee(anneesValides[anneesValides.length - 1]);
      const sN1 = anneesValides.length >= 2 ? getTotauxAnnee(anneesValides[anneesValides.length - 2]) : null;
      const sPremiere = getTotauxAnnee(anneesValides[0]);
      const annN1 = anneesValides.length >= 2 ? anneesValides[anneesValides.length - 2] : null;
      const annDep = anneesValides[0];

      const evol = (vN, vN1, annRef) => {
        if (!vN1 || vN1 === 0 || !annRef) return '';
        const p = ((vN - vN1) / vN1 * 100);
        const s = p > 0 ? '+' : '';
        const c = Math.abs(p) < 0.5 ? '#8A9BAA' : (p > 0 ? '#1A6B3C' : '#B52020');
        return `<span style="color:${c};font-weight:700;">${s}${p.toFixed(1)}%</span> vs ${annRef}`;
      };
      const evolDepuis = (vN, vDep, annDep) => {
        if (!vDep || vDep === 0 || vDep === vN) return '';
        const p = ((vN - vDep) / vDep * 100);
        const s = p > 0 ? '+' : '';
        const c = Math.abs(p) < 1 ? '#8A9BAA' : (p > 0 ? '#1A6B3C' : '#B52020');
        return ` — <span style="color:${c};">${s}${p.toFixed(1)}% depuis ${annDep}</span>`;
      };

      const fmtMS  = v  => v >= 1e9 ? (v/1e9).toFixed(2)+' Md€' : (v/1e6).toFixed(1)+' M€';
      const fmtEur = v  => Math.round(v).toLocaleString('fr-FR') + ' €';
      const fmtInt = v  => Math.round(v).toLocaleString('fr-FR');

      // Tableau de données historiques sous chaque sparkline
      const makeHistoRow = (formatFn, field) => {
        return anneesValides.map(a => {
          const s = getTotauxAnnee(a);
          const val = s ? s[field] : null;
          const isLast = (a === anneesValides[anneesValides.length - 1]);
          return `<div style="text-align:center;">
            <div style="font-size:9px;color:var(--gris3);font-weight:600;">${a}</div>
            <div style="font-size:10px;font-weight:${isLast ? '700' : '500'};color:${isLast ? 'var(--gris1)' : 'var(--gris2)'};">${val !== null ? formatFn(val) : '—'}</div>
          </div>`;
        }).join('');
      };

      return `
      <div class="kpi-strip">
        <div class="kpi-evol-card" style="border-left-color:var(--rep2);">
          <div class="kpi-evol-label">ETPT Global</div>
          <div class="kpi-evol-value">${fmtInt(sN.etpt)}</div>
          <div class="kpi-evol-sub">${evol(sN.etpt, sN1?.etpt, annN1)}${evolDepuis(sN.etpt, sPremiere?.etpt, annDep)}</div>
          <div class="spark-wrap"><canvas id="spark-etpt"></canvas></div>
          <div style="display:grid;grid-template-columns:repeat(${anneesValides.length},1fr);gap:2px;margin-top:6px;border-top:1px solid var(--bord);padding-top:5px;">
            ${makeHistoRow(fmtInt, 'etpt')}
          </div>
        </div>
        <div class="kpi-evol-card" style="border-left-color:var(--orange);">
          <div class="kpi-evol-label">Âge Moyen</div>
          <div class="kpi-evol-value">${sN.age_moyen.toFixed(1)} ans</div>
          <div class="kpi-evol-sub">${evol(sN.age_moyen, sN1?.age_moyen, annN1)}${evolDepuis(sN.age_moyen, sPremiere?.age_moyen, annDep)}</div>
          <div class="spark-wrap"><canvas id="spark-age"></canvas></div>
          <div style="display:grid;grid-template-columns:repeat(${anneesValides.length},1fr);gap:2px;margin-top:6px;border-top:1px solid var(--bord);padding-top:5px;">
            ${makeHistoRow(v => v.toFixed(1)+' ans', 'age_moyen')}
          </div>
        </div>
        <div class="kpi-evol-card" style="border-left-color:var(--vert);">
          <div class="kpi-evol-label">Masse Salariale</div>
          <div class="kpi-evol-value" style="font-size:20px;">${fmtMS(sN.ms)}</div>
          <div class="kpi-evol-sub">${evol(sN.ms, sN1?.ms, annN1)}${evolDepuis(sN.ms, sPremiere?.ms, annDep)}</div>
          <div class="spark-wrap"><canvas id="spark-ms"></canvas></div>
          <div style="display:grid;grid-template-columns:repeat(${anneesValides.length},1fr);gap:2px;margin-top:6px;border-top:1px solid var(--bord);padding-top:5px;">
            ${makeHistoRow(fmtMS, 'ms')}
          </div>
        </div>
        <div class="kpi-evol-card" style="border-left-color:var(--rouge);">
          <div class="kpi-evol-label">MS / Agent</div>
          <div class="kpi-evol-value" style="font-size:20px;">${fmtEur(sN.ms_agent)}</div>
          <div class="kpi-evol-sub">${evol(sN.ms_agent, sN1?.ms_agent, annN1)}${evolDepuis(sN.ms_agent, sPremiere?.ms_agent, annDep)}</div>
          <div class="spark-wrap"><canvas id="spark-ms-agent"></canvas></div>
          <div style="display:grid;grid-template-columns:repeat(${anneesValides.length},1fr);gap:2px;margin-top:6px;border-top:1px solid var(--bord);padding-top:5px;">
            ${makeHistoRow(fmtEur, 'ms_agent')}
          </div>
        </div>
      </div>`;
    }

    function drawSparklines() {
      const anneesValides = ANNEES_DISPO.filter(a => getTotauxAnnee(a) !== null);
      if (anneesValides.length < 2) return;
      const labels = anneesValides.map(String);
      const series = anneesValides.map(a => getTotauxAnnee(a));

      const makeChart = (id, data, color) => {
        const el = document.getElementById(id);
        if (!el) return;
        // Détruire si existant
        const existing = Chart.getChart(el);
        if (existing) existing.destroy();
        new Chart(el.getContext('2d'), {
          type: 'line',
          data: { labels, datasets: [{ data, borderColor: color, borderWidth: 2,
            backgroundColor: color.replace('rgb','rgba').replace(')',',0.10)'),
            fill: true, tension: 0.4,
            pointRadius: 3, pointHoverRadius: 5,
            pointBackgroundColor: color, pointBorderColor: '#fff', pointBorderWidth: 1.5 }]},
          options: {
            responsive: false, animation: false,
            plugins: { legend:{ display:false }, tooltip:{ enabled:true }},
            scales: { x:{ display:false }, y:{ display:false, beginAtZero: false }}
          }
        });
      };

      makeChart('spark-etpt',     series.map(s => s.etpt),     'rgb(19,81,168)');
      makeChart('spark-age',      series.map(s => s.age_moyen),'rgb(192,90,0)');
      makeChart('spark-ms',       series.map(s => s.ms/1e6),   'rgb(26,107,60)');
      makeChart('spark-ms-agent', series.map(s => s.ms_agent), 'rgb(181,32,32)');
    }

    function drawSparklinesVehicules() {
      const anneesValides = ANNEES_DISPO.filter(a => getTotauxVehiculesAnnee(a) !== null);
      if (anneesValides.length < 2) return;
      const labels = anneesValides.map(String);

      const makeChart = (id, data, color) => {
        const el = document.getElementById(id);
        if (!el) return;
        const existing = Chart.getChart(el);
        if (existing) existing.destroy();
        new Chart(el.getContext('2d'), {
          type: 'line',
          data: { labels, datasets: [{ data, borderColor: color, borderWidth: 2,
            backgroundColor: color.replace('rgb','rgba').replace(')',',0.10)'),

    function getTotauxFonctAnnee(annee) {
      // Aggrège les colonnes Fonctionnement par année depuis la table directe
      // (pas de ligne nationale dans Consolidation pour Fonctionnement)
      if (!fonctionnementData || !fonctionnementData.Structure) return null;
      let cp = 0, mait = 0, fa = 0, fa4 = 0, pct = 0, nPct = 0;
      const cpCol   = `CP_${annee}`;
      const maitCol = `CP_${annee}_maitrisable`;
      const faCol   = `Fonct_agent_${annee}`;
      const pctCol  = `Pct_maitrisable_${annee}`;
      const fa4Col  = 'Fonct_agent_4ans'; // lissé = même pour toutes les années

      for (let i = 0; i < fonctionnementData.Structure.length; i++) {
        // Exclure les lignes consolidées (DI 972 consolidée = doublon des DR)
        if (fonctionnementData.Est_Consolide?.[i]) continue;
        cp   += Number(fonctionnementData[cpCol]?.[i])   || 0;
        mait += Number(fonctionnementData[maitCol]?.[i]) || 0;
        const fa_val = Number(fonctionnementData[faCol]?.[i]) || 0;
        if (fa_val > 0) { fa += fa_val; }
        const pct_val = Number(fonctionnementData[pctCol]?.[i]) || 0;
        if (pct_val > 0) { pct += pct_val; nPct++; }
        // 4ans : on n'additionne que pour l'année courante (colonne unique)
        if (annee === Math.max(...ANNEES_DISPO.filter(a => a <= 2025))) {
          fa4 += Number(fonctionnementData[fa4Col]?.[i]) || 0;
        }
      }
      if (cp === 0 && mait === 0) return null;

      // Compter les lignes non consolidées pour les moyennes
      const n = fonctionnementData.Structure.filter((s, i) =>
        !fonctionnementData.Est_Consolide?.[i]).length || 1;

      return {
        cp,
        mait,
        pct_mait: cp > 0 ? mait / cp * 100 : 0,
        fonct_agent: fa / n,
        fonct_agent_4ans: fa4 / n,
      };
    }

          const conso = getConsolidation(structuresData.id[i], ANNEE);
          if (conso) enfants.push({

            nom: structuresData.Nom?.[i] || '',

      return enfants.sort((a,b) => a.sigle.localeCompare(b.sigle));

    function getStructuresAffichees() {
      const structures = [];
      
      for (let i = 0; i < structuresData.id.length; i++) {
        const typeAffichage = structuresData.Type_Affichage?.[i];
        
        // Filtrer selon Type_Affichage (incluant 'DG' maintenant!)
        if (['DG', 'DI_Hexagone', 'DI_Outremer', 'DR_Antilles', 'DR_Outremer', 'SCN'].includes(typeAffichage)) {
          const structId = structuresData.id[i];
          const conso = getConsolidation(structId, ANNEE);
          
          if (conso) {
            structures.push({
              id: structId,
              sigle: structuresData.Sigle?.[i] || '',
              nom: structuresData.Nom?.[i] || '',
              type: structuresData.Type?.[i] || '',
              typeAffichage: typeAffichage,
              parent: structuresData.Parent?.[i],
              ...conso
            });
          }
        }
      }
      
      // Trier : DG > DI > DR > SCN
      structures.sort((a, b) => {
        const order = {
          'DG': 0,
          'DI_Hexagone': 1,
          'DI_Outremer': 1,
          'DR_Antilles': 2,
          'DR_Outremer': 2,
          'SCN': 3
        };
        
        const orderA = order[a.typeAffichage] || 99;
        const orderB = order[b.typeAffichage] || 99;
        
        if (orderA !== orderB) return orderA - orderB;
        return (a.sigle || '').localeCompare(b.sigle || '');
      });
      
      console.log('📊 Structures affichées:', structures.length, structures.map(s => s.sigle));
      return structures;
    }

      if (typeAffichage === 'DG') return 'DG';

      if (typeAffichage === 'DR_Antilles') return 'DR';
      if (typeAffichage === 'DR_Outremer') return 'DR';

    function formatNumber(num) {
      if (!num && num !== 0) return '—';
      return Math.round(num).toLocaleString('fr-FR');
    }

    function formatMilliers(num) {
      if (!num && num !== 0) return '—';
      return (num / 1000).toFixed(0);
    }

    function formatEuro(num) {
      if (!num && num !== 0) return '—';
      return Math.round(num).toLocaleString('fr-FR') + ' €';
    }

    function formatEcartMoyenne(valeur, moyenne) {
      if (!moyenne || moyenne === 0) return '';
      const ecart = ((valeur - moyenne) / moyenne * 100);
      const signe = ecart > 0 ? '+' : '';
      const couleur = Math.abs(ecart) < 5 ? 'var(--gris3)' : (ecart > 0 ? 'var(--rouge)' : 'var(--vert)');
      return `<span style="font-size: 10px; color: ${couleur}; margin-left: 4px;">(${signe}${ecart.toFixed(1)}%)</span>`;
    }

    function renderPercentBar(transport, hebergement, repas) {
      const total = transport + hebergement + repas;
      if (total === 0) return '<div class="percent-bar"></div><span class="percent-label">—</span>';
      
      const pctTransport = (transport / total * 100).toFixed(1);
      const pctHebergement = (hebergement / total * 100).toFixed(1);
      const pctRepas = (repas / total * 100).toFixed(1);
      
      return `
        <div class="percent-bar">
          ${transport > 0 ? `<div class="bar-segment bar-transport" style="width: ${pctTransport}%">${pctTransport}%</div>` : ''}
          ${hebergement > 0 ? `<div class="bar-segment bar-hebergement" style="width: ${pctHebergement}%">${pctHebergement}%</div>` : ''}
          ${repas > 0 ? `<div class="bar-segment bar-repas" style="width: ${pctRepas}%">${pctRepas}%</div>` : ''}
        </div>
        <span class="percent-label">${formatMilliers(total)} k€</span>
      `;
    }

    function render() {
      const structures = getStructuresAffichees();
      
      if (structures.length === 0) {
        document.getElementById('content').innerHTML = 
          '<div class="error">Aucune structure trouvée. Vérifiez que la table Consolidation_Structure est remplie et que Type_Affichage est défini dans Structures.</div>';
        return;
      }
      
      // Séparer les structures par bloc
      const blocDG = structures.filter(s => s.typeAffichage === 'DG');
      const blocDIMetropole = structures.filter(s => s.typeAffichage === 'DI_Hexagone');
      
      // Bloc Outremer : DI 972 + DR Antilles
      const diOutremer = structures.find(s => s.typeAffichage === 'DI_Outremer');
      const drAntilles = structures.filter(s => s.typeAffichage === 'DR_Antilles');
      const blocOutremer = diOutremer ? [diOutremer, ...drAntilles] : drAntilles;
      
      const blocDROutremer = structures.filter(s => s.typeAffichage === 'DR_Outremer');
      const blocSCN = structures.filter(s => s.typeAffichage === 'SCN');
      
      // ═══════════════════════════════════════════════════════════════
      // TOTAUX GLOBAUX — lus depuis Consolidation (périmètre National)
      // Source unique de vérité : tous les calculs sont dans Grist
      // ═══════════════════════════════════════════════════════════════
      const totaux = (function() {
        const i = getNationalRow(ANNEE);
        const zero = {
          effectif_total: 0, effectif_su: 0, effectif_agco: 0, effectif_autres: 0,
          age_moyen: 0, masse_salariale: 0, ms_par_agent: 0,
          nb_vehicules: 0, nb_vetustes: 0, budget_vehicules: 0,
          taux_vetuste: 0, ratio_vehicule_agent: 0, ratio_vehicule_su: 0, cout_fonct_vehicule: 0,
          transport: 0, hebergement: 0, repas: 0, formation: 0, autres_missions: 0, frais_par_agent: 0,
          postes_fixes: 0, portables: 0, nb_postes_total: 0, taux_equipement: 0,
          budget_it: 0, budget_it_4ans: 0, it_par_agent: 0, it_par_agent_lisse: 0,
        };
        if (i === null) return zero;
        const d = consolidationNationaleData;
        const n = (col) => Number(d[col]?.[i]) || 0;
        return {
          effectif_total:       n('Total_Effectif'),
          effectif_su:          n('Total_Effectif_SU'),
          effectif_agco:        n('Total_Effectif_AGCO'),
          effectif_autres:      n('Total_Effectif_Autres'),
          age_moyen:            n('Age_Moyen_Global'),
          masse_salariale:      n('Total_Masse_Salariale'),
          ms_par_agent:         n('Moyenne_MS_Par_Agent'),
          nb_vehicules:         n('Total_Vehicules'),
          nb_vetustes:          n('Total_Vehicules_Vetustes'),
          budget_vehicules:     n('Total_Budget_Vehicules'),
          taux_vetuste:         n('Taux_Vetuste_Moyen'),
          ratio_vehicule_agent: n('Ratio_Vehicule_Agent'),
          ratio_vehicule_su:    n('Moy_Ratio_Vehicule_SU'),
          cout_fonct_vehicule:  n('Moy_Cout_Fonctionnement_Par_Vehicule'),
          transport:            n('Total_Transport'),
          hebergement:          n('Total_Hebergement'),
          repas:                n('Total_Repas'),
          formation:            n('Total_Formation'),
          autres_missions:      n('Total_Autres_Missions'),
          frais_par_agent:      n('Moyenne_Frais_Par_Agent'),
          postes_fixes:         0, // non disponible dans Consolidation
          portables:            0, // non disponible dans Consolidation
          nb_postes_total:      0, // non disponible dans Consolidation
          taux_equipement:      0, // non disponible dans Consolidation
          budget_it:            n('Total_Budget_IT'),
          budget_it_4ans:       n('Total_Budget_IT_4ans'),
          it_par_agent:         n('Moyenne_Budget_IT_Par_Agent'),
          it_par_agent_lisse:   n('Moy_Budget_IT_Moyen_Par_Agent_4ans'),
        };
      })();

      // Postes IT : non présents dans Consolidation, calculés depuis Consolidation_Structure
      totaux.postes_fixes    = consolidationData.Postes_Fixes
        ? consolidationData.Postes_Fixes.reduce((s, v, i) => consolidationData.Annee[i] === ANNEE ? s + (Number(v) || 0) : s, 0) : 0;
      totaux.portables       = consolidationData.Portables
        ? consolidationData.Portables.reduce((s, v, i) => consolidationData.Annee[i] === ANNEE ? s + (Number(v) || 0) : s, 0) : 0;
      totaux.nb_postes_total = totaux.postes_fixes + totaux.portables;
      totaux.taux_equipement = totaux.effectif_total > 0 ? totaux.nb_postes_total / totaux.effectif_total : 0;
      
      const moyennes = getMoyennes(ANNEE);
      
      document.getElementById('content').innerHTML = `
        ${renderRHSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes)}
        ${renderVehiculesSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes)}
        ${renderFraisMissionSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes)}
        ${renderInformatiqueSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes)}
        ${renderCommunicationSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN)}
        ${renderFonctionnementSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN)}
      `;
    }

    function buildSectionRows(section, blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, moyennes) {
      let rows = '';
      const addRow = (s, indent) => {
        const drEnfants = (s.typeAffichage === 'DI_Hexagone') ? getDREnfants(s.id) : [];
        if (drEnfants.length > 0) {
          // Ligne DI parent avec toggle
          rows += renderStructureRowToggle(s, section, moyennes)[section];
          drEnfants.forEach(dr => { rows += renderDRChildRow(dr, section, moyennes)[section]; });
        } else {
          rows += renderStructureRow(s, indent, moyennes)[section];
        }
      };
      blocDG.forEach(s => addRow(s, false));
      blocDIMetropole.forEach(s => addRow(s, false));
      blocOutremer.forEach((s, idx) => addRow(s, idx > 0));
      blocDROutremer.forEach(s => addRow(s, false));
      blocSCN.forEach(s => addRow(s, false));
      return rows;
    }

    function renderVehiculesSection(blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, totaux, moyennes) {
      const rows = buildSectionRows('vehicules', blocDG, blocDIMetropole, blocOutremer, blocDROutremer, blocSCN, moyennes);

      // ── KPI évolution multi-années ────────────────────────────────
      const anneesValides = ANNEES_DISPO.filter(a => getTotauxVehiculesAnnee(a) !== null);
      let kpiStrip = '';

      if (anneesValides.length > 0) {
        const sN   = getTotauxVehiculesAnnee(anneesValides[anneesValides.length - 1]);
        const sN1  = anneesValides.length >= 2 ? getTotauxVehiculesAnnee(anneesValides[anneesValides.length - 2]) : null;
        const sDep = getTotauxVehiculesAnnee(anneesValides[0]);
        const annN1  = anneesValides.length >= 2 ? anneesValides[anneesValides.length - 2] : null;
        const annDep = anneesValides[0];

        const evol = (vN, vN1, annRef) => {
          if (!vN1 || vN1 === 0 || !annRef) return '';
          const p = ((vN - vN1) / vN1 * 100);
          const s = p > 0 ? '+' : '';
          const c = Math.abs(p) < 0.5 ? '#8A9BAA' : (p > 0 ? '#B52020' : '#1A6B3C');
          return `<span style="color:${c};font-weight:700;">${s}${p.toFixed(1)}%</span> vs ${annRef}`;
        };
        const evolDepuis = (vN, vDep, annDep) => {
          if (!vDep || vDep === 0 || vDep === vN) return '';
          const p = ((vN - vDep) / vDep * 100);
          const s = p > 0 ? '+' : '';
          const c = Math.abs(p) < 1 ? '#8A9BAA' : (p > 0 ? '#B52020' : '#1A6B3C');
          return ` — <span style="color:${c};">${s}${p.toFixed(1)}% depuis ${annDep}</span>`;
        };
        // Pour vétusté et ratio SU : hausse = mauvais (rouge), baisse = bon (vert)
        // Pour total et coût aussi : hausse = rouge, baisse = vert (parcimonieux)
        const evolVet = (vN, vN1, annRef) => {
          if (!vN1 || vN1 === 0 || !annRef) return '';
          const p = ((vN - vN1) / vN1 * 100);
          const s = p > 0 ? '+' : '';
          const c = Math.abs(p) < 0.5 ? '#8A9BAA' : (p > 0 ? '#B52020' : '#1A6B3C');
          return `<span style="color:${c};font-weight:700;">${s}${p.toFixed(1)}%</span> vs ${annRef}`;
        };

        const fmtNb  = v => Math.round(v).toLocaleString('fr-FR');
        const fmtPct = v => v.toFixed(1) + ' %';
        const fmtRatio = v => v.toFixed(3);
        const fmtKEur  = v => (v / 1000).toFixed(0) + ' k€';

        const makeHistoRow = (formatFn, getVal) => {
          return anneesValides.map(a => {
            const sv = getTotauxVehiculesAnnee(a);
            const val = sv ? getVal(sv) : null;
            const isLast = (a === anneesValides[anneesValides.length - 1]);
            return `<div style="text-align:center;">
              <div style="font-size:9px;color:var(--gris3);font-weight:600;">${a}</div>
              <div style="font-size:10px;font-weight:${isLast ? '700' : '500'};color:${isLast ? 'var(--gris1)' : 'var(--gris2)'};">${val !== null ? formatFn(val) : '—'}</div>
            </div>`;
          }).join('');
        };

        kpiStrip = `
        <div class="kpi-strip">

          <div class="kpi-evol-card" style="border-left-color:var(--rep2);">
            <div class="kpi-evol-label">Parc Global</div>
            <div class="kpi-evol-value">${fmtNb(sN.nb)}</div>
            <div class="kpi-evol-sub">${evol(sN.nb, sN1?.nb, annN1)}${evolDepuis(sN.nb, sDep?.nb, annDep)}</div>
            <div class="spark-wrap"><canvas id="spark-veh-total"></canvas></div>
            <div style="display:grid;grid-template-columns:repeat(${anneesValides.length},1fr);gap:2px;margin-top:6px;border-top:1px solid var(--bord);padding-top:5px;">
              ${makeHistoRow(fmtNb, s => s.nb)}
            </div>
          </div>

          <div class="kpi-evol-card" style="border-left-color:var(--orange);">
            <div class="kpi-evol-label">Taux de Vétusté</div>
            <div class="kpi-evol-value">${fmtPct(sN.taux_vetuste)}</div>
            <div class="kpi-evol-sub">${evolVet(sN.taux_vetuste, sN1?.taux_vetuste, annN1)}${evolDepuis(sN.taux_vetuste, sDep?.taux_vetuste, annDep)}</div>
            <div class="spark-wrap"><canvas id="spark-veh-vetuste"></canvas></div>
            <div style="display:grid;grid-template-columns:repeat(${anneesValides.length},1fr);gap:2px;margin-top:6px;border-top:1px solid var(--bord);padding-top:5px;">
              ${makeHistoRow(fmtPct, s => s.taux_vetuste)}
            </div>
          </div>

          <div class="kpi-evol-card" style="border-left-color:#6B3FA0;">
            <div class="kpi-evol-label">Ratio / Agent SU</div>
            <div class="kpi-evol-value">${fmtRatio(sN.ratio_su)}</div>
            <div class="kpi-evol-sub">${evol(sN.ratio_su, sN1?.ratio_su, annN1)}${evolDepuis(sN.ratio_su, sDep?.ratio_su, annDep)}</div>
            <div class="spark-wrap"><canvas id="spark-veh-ratio-su"></canvas></div>

    function getTotauxMissionsAnnee(annee) {
      const i = getNationalRow(annee);
      if (i === null) return null;
      const d = consolidationNationaleData;
      const formation = Number(d.Total_Formation?.[i]) || 0;
      const autres    = Number(d.Total_Autres_Missions?.[i]) || 0;
      const frais_agent = Number(d.Moyenne_Frais_Par_Agent?.[i]) || 0;
      if (formation === 0 && autres === 0 && frais_agent === 0) return null;
      return {
        formation,
        autres_missions: autres,
        frais_par_agent: frais_agent,
        transport:   Number(d.Total_Transport?.[i])   || 0,
        hebergement: Number(d.Total_Hebergement?.[i]) || 0,
        repas:       Number(d.Total_Repas?.[i])       || 0,
      };
    }

    function getComData(structureId) {
      if (!communicationData || !communicationData.Structure) return null;
      // Chercher la ligne consolidée en priorité (DI Outremer)
      let idx = -1;
      if (communicationData.Est_Consolide) {
        idx = communicationData.Structure.findIndex((s, i) =>
          s === structureId && communicationData.Est_Consolide[i]);
      }
      // Fallback : ligne non consolidée
      if (idx === -1) {
        idx = communicationData.Structure.findIndex((s, i) =>
          s === structureId && !communicationData.Est_Consolide?.[i]);
      }
      if (idx === -1) idx = communicationData.Structure.indexOf(structureId);
      if (idx === -1) return null;

      const v = (col) => communicationData[col] ? (communicationData[col][idx] || 0) : 0;
      const cp_2024    = v('CP_2024');
      const cp_2025    = v('CP_2025');
      const cp_2026    = v('CP_2026');
      const cible_2026 = v('Cible_2026');
      const taux_grist = v('Taux_Conso_2026');
      const taux       = taux_grist || (cible_2026 ? cp_2026 / cible_2026 : 0);
      // Date d'import : format DD-MM-YYYY (chaîne) ou timestamp secondes
      const dateRaw = communicationData.Date_Import_2026 ? (communicationData.Date_Import_2026[idx] || null) : null;
      let date_import_str = null;
      if (dateRaw) {
        if (typeof dateRaw === 'string' && dateRaw.match(/^\d{2}-\d{2}-\d{4}$/)) {
          date_import_str = dateRaw; // déjà DD-MM-YYYY
        } else if (typeof dateRaw === 'number' && dateRaw > 0) {
          const d = new Date(dateRaw * 1000);
          date_import_str = d.toLocaleDateString('fr-FR');
        }
      }
      return { cp_2022: v('CP_2022'), cp_2023: v('CP_2023'), cp_2024, cp_2025, cp_2026,
               ej_2026: v('EJ_2026'), cible_2026, cap_cp_2026: v('Capacite_CP_2026'),
               taux_conso: taux, date_import: date_import_str };
    }

    function fmtCom(val) {
      if (!val) return '—';
      if (Math.abs(val) >= 1000) return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0 }).format(Math.round(val / 1000)) + ' K€';
      return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0 }).format(val) + ' €';
    }

    function getFonctData(structureId) {
      if (!fonctionnementData || !fonctionnementData.Structure) return null;

      let idx = -1;
      if (fonctionnementData.Est_Consolide) {

          s === structureId && fonctionnementData.Est_Consolide[i]);
      }
      // Fallback : ligne non consolidée
      if (idx === -1) {
        idx = fonctionnementData.Structure.findIndex((s, i) =>
          s === structureId && !fonctionnementData.Est_Consolide?.[i]);
      }
      if (idx === -1) idx = fonctionnementData.Structure.indexOf(structureId);
      if (idx === -1) return null;

      const v = (col) => fonctionnementData[col] ? (Number(fonctionnementData[col][idx]) || 0) : 0;
      return {
        cp_2022:            v('CP_2022'),
        cp_2023:            v('CP_2023'),
        cp_2024:            v('CP_2024'),
        cp_2025:            v('CP_2025'),

        cp_2023_mait:       v('CP_2023_maitrisable'),

        fonct_agent_2023:   v('Fonct_agent_2023'),
        fonct_agent_2024:   v('Fonct_agent_2024'),
        fonct_agent_2025:   v('Fonct_agent_2025'),

        pct_mait_2025:      v('Pct_maitrisable_2025'),
      };
    }

    function fmtFonct(val) {
      if (!val) return '—';
      if (Math.abs(val) >= 1e6) return (val / 1e6).toFixed(1) + ' M€';
      if (Math.abs(val) >= 1000) return Math.round(val / 1000).toLocaleString('fr-FR') + ' K€';
      return Math.round(val).toLocaleString('fr-FR') + ' €';

        const p = ((vN - vDep) / vDep * 100);
        const s = p > 0 ? '+' : '';
        const c = Math.abs(p) < 1 ? '#8A9BAA' : (p > 0 ? '#B52020' : '#1A6B3C');
        return ` — <span style="color:${c};">${s}${p.toFixed(1)}% depuis ${annDep}</span>`;
      };

      let kpiStrip = '';
      if (anneesValidesF.length > 0) {
        const sN   = getTotauxFonctAnnee(anneesValidesF[anneesValidesF.length - 1]);
        const sN1  = anneesValidesF.length >= 2 ? getTotauxFonctAnnee(anneesValidesF[anneesValidesF.length - 2]) : null;
        const sDep = getTotauxFonctAnnee(anneesValidesF[0]);
        const annN1  = anneesValidesF.length >= 2 ? anneesValidesF[anneesValidesF.length - 2] : null;
        const annDep = anneesValidesF[0];

        const makeHistoF = (formatFn, getVal) => anneesValidesF.map(a => {
          const sv = getTotauxFonctAnnee(a);
          const val = sv ? getVal(sv) : null;
          const isLast = (a === anneesValidesF[anneesValidesF.length - 1]);
          return `<div style="text-align:center;">
            <div style="font-size:9px;color:var(--gris3);font-weight:600;">${a}</div>
            <div style="font-size:10px;font-weight:${isLast ? '700' : '500'};color:${isLast ? 'var(--gris1)' : 'var(--gris2)'};">${val !== null ? formatFn(val) : '—'}</div>
          </div>`;
        }).join('');

        kpiStrip = `
        <div class="kpi-strip">

          <div class="kpi-evol-card" style="border-left-color:var(--rep2);">
            <div class="kpi-evol-label">CP Total</div>
            <div class="kpi-evol-value" style="font-size:20px;">${fKEur(sN.cp)}</div>
            <div class="kpi-evol-sub">${evolF(sN.cp, sN1?.cp, annN1)}${evolDepuisF(sN.cp, sDep?.cp, annDep)}</div>
            <div class="spark-wrap"><canvas id="spark-fonct-cp"></canvas></div>
            <div style="display:grid;grid-template-columns:repeat(${anneesValidesF.length},1fr);gap:2px;margin-top:6px;border-top:1px solid var(--bord);padding-top:5px;">
              ${makeHistoF(fKEur, s => s.cp)}
            </div>
          </div>

          <div class="kpi-evol-card" style="border-left-color:var(--orange);">
            <div class="kpi-evol-label">% Maîtrisable</div>
            <div class="kpi-evol-value" style="font-size:20px;">${fPct(sN.pct_mait)}</div>
            <div class="kpi-evol-sub">${evolF(sN.pct_mait, sN1?.pct_mait, annN1)}${evolDepuisF(sN.pct_mait, sDep?.pct_mait, annDep)}</div>
            <div class="spark-wrap"><canvas id="spark-fonct-pct"></canvas></div>
            <div style="display:grid;grid-template-columns:repeat(${anneesValidesF.length},1fr);gap:2px;margin-top:6px;border-top:1px solid var(--bord);padding-top:5px;">
              ${makeHistoF(fPct, s => s.pct_mait)}
            </div>
          </div>

          <div class="kpi-evol-card" style="border-left-color:#6B3FA0;">
            <div class="kpi-evol-label">Maîtrisable / Agent</div>
            <div class="kpi-evol-value" style="font-size:20px;">${fEur(sN.fonct_agent)}</div>
            <div class="kpi-evol-sub">${evolF(sN.fonct_agent, sN1?.fonct_agent, annN1)}${evolDepuisF(sN.fonct_agent, sDep?.fonct_agent, annDep)}${moyennesF && moyennesF.fonct_par_agent ? formatEcartMoyenne(sN.fonct_agent, moyennesF.fonct_par_agent) : ''}</div>
            <div class="spark-wrap"><canvas id="spark-fonct-agent"></canvas></div>
            <div style="display:grid;grid-template-columns:repeat(${anneesValidesF.length},1fr);gap:2px;margin-top:6px;border-top:1px solid var(--bord);padding-top:5px;">
              ${makeHistoF(fEur, s => s.fonct_agent)}
            </div>
          </div>

          <div class="kpi-evol-card" style="border-left-color:var(--vert);">
            <div class="kpi-evol-label">Maîtrisable / Agent (Lissé 4 ans)</div>
            <div class="kpi-evol-value" style="font-size:20px;">${fEur(sN.fonct_agent_4ans)}</div>
            <div class="kpi-evol-sub">${moyennesF && moyennesF.fonct_par_agent_4ans ? formatEcartMoyenne(sN.fonct_agent_4ans, moyennesF.fonct_par_agent_4ans) : ''}</div>
            <div style="font-size:10px;color:var(--gris3);margin-top:8px;font-style:italic;">Moyenne CP maîtrisable 2022–2025 / agent</div>
          </div>

        </div>`;
      }

      const kpis = kpiStrip;


      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon">🏢</div>
            <div class="section-title">Fonctionnement Courant</div>
          </div>

          ${kpis}

          <button id="fonct-toggle-btn" onclick="(function(){
            var w = document.getElementById('fonct-table-wrapper');
            var btn = document.getElementById('fonct-toggle-btn');
            var open = w.style.display !== 'none';
            w.style.display = open ? 'none' : 'block';
            btn.innerHTML = open ? '▶&nbsp; Voir le détail par structure' : '▼&nbsp; Masquer le détail';
          })()"
          style="background:none;border:1px solid var(--bord);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--gris2);cursor:pointer;margin-bottom:12px;">
            ▶&nbsp; Voir le détail par structure
          </button>

          <div id="fonct-table-wrapper" style="display:none;">
            <table>
              <thead>
                <tr>
                  <th>Structure</th>
                  <th class="number">CP 2022</th>
                  <th class="number">CP 2023</th>
                  <th class="number">CP 2024</th>
                  <th class="number" style="color:var(--rep2);">CP 2025</th>
                  <th class="number">Maîtrisable 2025</th>
                  <th class="number">Maît. / Agent</th>
                  <th class="number">Maît. / Agent Lissé</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
                <tr class="row-total">
                  <td>TOTAL</td>
                  <td class="number">${fmtFonct(totaux.cp_2022)}</td>
                  <td class="number">${fmtFonct(totaux.cp_2023)}</td>
                  <td class="number">${fmtFonct(totaux.cp_2024)}</td>
                  <td class="number" style="color:var(--rep2);font-weight:700;">${fmtFonct(totaux.cp_2025)}</td>
                  <td class="number">${fmtFonct(totaux.cp_2025_mait)}</td>
                  <td class="number">—</td>
                  <td class="number">—</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
