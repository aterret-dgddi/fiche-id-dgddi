<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de Bord de Gestion - DGDDI</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      padding: 20px;
      color: #2d3748;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 8px;
      padding: 25px 35px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
    }

    .header-content h1 {
      font-size: 28px;
      color: #1e3a8a;
      margin-bottom: 5px;
    }

    .header-content p {
      color: #64748b;
      font-size: 14px;
    }

    .section {
      background: white;
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 3px solid #e2e8f0;
    }

    .section-icon {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }

    .section-header h2 {
      font-size: 22px;
      color: #1e293b;
      font-weight: 600;
    }

    .bg-rh { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .bg-vehicules { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    .bg-missions { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .bg-it { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    thead th {
      background: #f8fafc;
      padding: 14px 12px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #e2e8f0;
    }

    thead th:first-child {
      border-top-left-radius: 8px;
    }

    thead th:last-child {
      border-top-right-radius: 8px;
    }

    tbody tr {
      border-bottom: 1px solid #f1f5f9;
      transition: background-color 0.2s;
    }

    tbody tr:hover {
      background-color: #f8fafc;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody td {
      padding: 14px 12px;
      font-size: 14px;
      color: #334155;
    }

    tbody td:first-child {
      font-weight: 600;
      color: #1e293b;
    }

    .number {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .percent-bar-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .percent-bar {
      flex: 1;
      height: 24px;
      background: #f1f5f9;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
    }

    .bar-segment {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      transition: all 0.3s;
    }

    .bar-transport { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    .bar-hebergement { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .bar-repas { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }

    .percent-label {
      font-size: 13px;
      color: #64748b;
      min-width: 80px;
      text-align: right;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
      font-size: 18px;
    }

    .error {
      background: #fee;
      color: #c00;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #c00;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 8px;
      text-transform: uppercase;
    }

    .badge-direction { background: #dbeafe; color: #1e40af; }
    .badge-di { background: #d1fae5; color: #065f46; }
    .badge-scn { background: #fef3c7; color: #92400e; }
    .badge-dr { background: #e0e7ff; color: #3730a3; }

    .row-total {
      font-weight: bold;
      background: #f8fafc !important;
      border-top: 2px solid #cbd5e1 !important;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        text-align: center;
      }

      table {
        font-size: 12px;
      }

      thead th, tbody td {
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">DG</div>
      <div class="header-content">
        <h1>Tableau de Bord de Gestion</h1>
        <p>Direction Générale des Douanes et Droits Indirects • Synthèse <span id="anneeAffichee">2024</span></p>
      </div>
    </div>

    <div id="loading" class="loading">Chargement des données...</div>
    <div id="content" style="display: none;"></div>
  </div>

  <script>
    let ANNEE = 2024;
    let consolidationData = [];
    let structuresData = [];

    async function init() {
      try {
        await grist.ready();
        
        // Charger les données
        const [consolidation, structures] = await Promise.all([
          grist.docApi.fetchTable('Consolidation_Structure'),
          grist.docApi.fetchTable('Structures')
        ]);
        
        consolidationData = consolidation;
        structuresData = structures;
        
        console.log('✅ Données chargées:', {
          consolidation: consolidation.id.length,
          structures: structures.id.length
        });
        
        // Détecter la dernière année
        const annees = [...new Set(consolidation.Annee.filter(a => a > 0))];
        ANNEE = Math.max(...annees);
        document.getElementById('anneeAffichee').textContent = ANNEE;
        
        render();
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        
      } catch (error) {
        console.error('❌ Erreur initialisation:', error);
        document.getElementById('loading').innerHTML = 
          `<div class="error">Erreur de chargement : ${error.message}<br><br>Vérifiez que la table Consolidation_Structure existe et est remplie.</div>`;
      }
    }

    function getConsolidation(structureId, annee) {
      for (let i = 0; i < consolidationData.Structure.length; i++) {
        if (consolidationData.Structure[i] === structureId && consolidationData.Annee[i] === annee) {
          return {
            effectif_total: consolidationData.Effectif_Total?.[i] || 0,
            effectif_su: consolidationData.Effectif_SU?.[i] || 0,
            effectif_agco: consolidationData.Effectif_AGCO?.[i] || 0,
            effectif_autres: consolidationData.Effectif_Autres?.[i] || 0,
            age_moyen: consolidationData.Age_Moyen?.[i] || 0,
            masse_salariale: consolidationData.Masse_Salariale?.[i] || 0,
            ms_par_agent: consolidationData.MS_Par_Agent?.[i] || 0,
            
            nb_vehicules: consolidationData.Nb_Vehicules?.[i] || 0,
            nb_vetustes: consolidationData.Nb_Vehicules_Vetustes?.[i] || 0,
            ratio_vehicule_agent: consolidationData.Ratio_Vehicule_Agent?.[i] || 0,
            ratio_vehicule_su: consolidationData.Ratio_Vehicule_SU?.[i] || 0,
            budget_vehicules: consolidationData.Budget_Vehicules?.[i] || 0,
            cout_fonct_vehicule: consolidationData.Cout_Fonctionnement_Par_Vehicule?.[i] || 0,
            
            transport: consolidationData.Transport?.[i] || 0,
            hebergement: consolidationData.Hebergement?.[i] || 0,
            repas: consolidationData.Repas?.[i] || 0,
            formation: consolidationData.Formation?.[i] || 0,
            autres_missions: consolidationData.Autres_Missions?.[i] || 0,
            frais_par_agent: consolidationData.Frais_Mission_Par_Agent?.[i] || 0,
            
            postes_fixes: consolidationData.Postes_Fixes?.[i] || 0,
            portables: consolidationData.Portables?.[i] || 0,
            budget_it: consolidationData.Budget_IT_CP?.[i] || 0,
            budget_it_4ans: consolidationData.Budget_IT_4ans?.[i] || 0,
            it_par_agent: consolidationData.IT_Par_Agent?.[i] || 0,
            it_par_agent_lisse: consolidationData.IT_Par_Agent_Lisse?.[i] || 0
          };
        }
      }
      return null;
    }

    function getStructuresAffichees() {
      const structures = [];
      
      for (let i = 0; i < structuresData.id.length; i++) {
        const typeAffichage = structuresData.Type_Affichage?.[i];
        
        // Filtrer selon Type_Affichage
        if (['Direction', 'DI_Hexagone', 'DI_Outremer', 'DR_Antilles', 'DR_Outremer', 'SCN'].includes(typeAffichage)) {
          const structId = structuresData.id[i];
          const conso = getConsolidation(structId, ANNEE);
          
          if (conso) {
            structures.push({
              id: structId,
              sigle: structuresData.Sigle?.[i] || '',
              nom: structuresData.Nom?.[i] || '',
              type: structuresData.Type?.[i] || '',
              typeAffichage: typeAffichage,
              ...conso
            });
          }
        }
      }
      
      // Trier : Direction > DI > DR > SCN
      structures.sort((a, b) => {
        const order = {
          'Direction': 0,
          'DI_Hexagone': 1,
          'DI_Outremer': 1,
          'DR_Antilles': 2,
          'DR_Outremer': 2,
          'SCN': 3
        };
        
        const orderA = order[a.typeAffichage] || 99;
        const orderB = order[b.typeAffichage] || 99;
        
        if (orderA !== orderB) return orderA - orderB;
        return (a.sigle || '').localeCompare(b.sigle || '');
      });
      
      console.log('📊 Structures affichées:', structures.length);
      return structures;
    }

    function getBadgeClass(typeAffichage) {
      if (typeAffichage === 'Direction') return 'badge-direction';
      if (typeAffichage.startsWith('DI')) return 'badge-di';
      if (typeAffichage.startsWith('DR')) return 'badge-dr';
      if (typeAffichage === 'SCN') return 'badge-scn';
      return 'badge-di';
    }

    function getBadgeLabel(typeAffichage, type) {
      if (typeAffichage === 'Direction') return 'DG';
      if (typeAffichage === 'DI_Outremer') return 'DI';
      if (typeAffichage === 'DI_Hexagone') return 'DI';
      if (typeAffichage === 'DR_Antilles') return 'DR';
      if (typeAffichage === 'DR_Outremer') return 'DR';
      return type;
    }

    function formatNumber(num) {
      if (!num && num !== 0) return '—';
      return Math.round(num).toLocaleString('fr-FR');
    }

    function formatMilliers(num) {
      if (!num && num !== 0) return '—';
      return (num / 1000).toFixed(0);
    }

    function formatEuro(num) {
      if (!num && num !== 0) return '—';
      return Math.round(num).toLocaleString('fr-FR') + ' €';
    }

    function renderPercentBar(transport, hebergement, repas) {
      const total = transport + hebergement + repas;
      if (total === 0) return '<div class="percent-bar"></div><span class="percent-label">—</span>';
      
      const pctTransport = (transport / total * 100).toFixed(1);
      const pctHebergement = (hebergement / total * 100).toFixed(1);
      const pctRepas = (repas / total * 100).toFixed(1);
      
      return `
        <div class="percent-bar">
          ${transport > 0 ? `<div class="bar-segment bar-transport" style="width: ${pctTransport}%">${pctTransport}%</div>` : ''}
          ${hebergement > 0 ? `<div class="bar-segment bar-hebergement" style="width: ${pctHebergement}%">${pctHebergement}%</div>` : ''}
          ${repas > 0 ? `<div class="bar-segment bar-repas" style="width: ${pctRepas}%">${pctRepas}%</div>` : ''}
        </div>
        <span class="percent-label">${formatMilliers(total)} k€</span>
      `;
    }

    function render() {
      const structures = getStructuresAffichees();
      
      if (structures.length === 0) {
        document.getElementById('content').innerHTML = 
          '<div class="error">Aucune structure trouvée. Vérifiez que la table Consolidation_Structure est remplie et que Type_Affichage est défini dans Structures.</div>';
        return;
      }
      
      // Calculer totaux
      const totaux = structures.reduce((acc, s) => ({
        effectif_total: acc.effectif_total + s.effectif_total,
        effectif_su: acc.effectif_su + s.effectif_su,
        effectif_agco: acc.effectif_agco + s.effectif_agco,
        effectif_autres: acc.effectif_autres + s.effectif_autres,
        masse_salariale: acc.masse_salariale + s.masse_salariale,
        sum_age: acc.sum_age + (s.age_moyen * s.effectif_total),
        
        nb_vehicules: acc.nb_vehicules + s.nb_vehicules,
        nb_vetustes: acc.nb_vetustes + s.nb_vetustes,
        budget_vehicules: acc.budget_vehicules + s.budget_vehicules,
        
        transport: acc.transport + s.transport,
        hebergement: acc.hebergement + s.hebergement,
        repas: acc.repas + s.repas,
        formation: acc.formation + s.formation,
        autres_missions: acc.autres_missions + s.autres_missions,
        
        postes_fixes: acc.postes_fixes + s.postes_fixes,
        portables: acc.portables + s.portables,
        budget_it: acc.budget_it + s.budget_it,
        budget_it_4ans: acc.budget_it_4ans + s.budget_it_4ans
      }), {
        effectif_total: 0, effectif_su: 0, effectif_agco: 0, effectif_autres: 0,
        masse_salariale: 0, sum_age: 0,
        nb_vehicules: 0, nb_vetustes: 0, budget_vehicules: 0,
        transport: 0, hebergement: 0, repas: 0, formation: 0, autres_missions: 0,
        postes_fixes: 0, portables: 0, budget_it: 0, budget_it_4ans: 0
      });
      
      totaux.age_moyen = totaux.effectif_total > 0 ? totaux.sum_age / totaux.effectif_total : 0;
      totaux.ms_par_agent = totaux.effectif_total > 0 ? totaux.masse_salariale / totaux.effectif_total : 0;
      totaux.ratio_vehicule_agent = totaux.effectif_total > 0 ? totaux.nb_vehicules / totaux.effectif_total : 0;
      totaux.ratio_vehicule_su = totaux.effectif_su > 0 ? totaux.nb_vehicules / totaux.effectif_su : 0;
      totaux.cout_fonct_vehicule = totaux.nb_vehicules > 0 ? totaux.budget_vehicules / totaux.nb_vehicules : 0;
      totaux.frais_par_agent = totaux.effectif_total > 0 ? (totaux.transport + totaux.hebergement + totaux.repas) / totaux.effectif_total : 0;
      totaux.it_par_agent = totaux.effectif_total > 0 ? totaux.budget_it / totaux.effectif_total : 0;
      totaux.it_par_agent_lisse = totaux.effectif_total > 0 ? totaux.budget_it_4ans / totaux.effectif_total : 0;
      
      document.getElementById('content').innerHTML = `
        ${renderRHSection(structures, totaux)}
        ${renderVehiculesSection(structures, totaux)}
        ${renderFraisMissionSection(structures, totaux)}
        ${renderInformatiqueSection(structures, totaux)}
      `;
    }

    function renderRHSection(structures, totaux) {
      const rows = structures.map(s => {
        const badgeClass = getBadgeClass(s.typeAffichage);
        const badgeLabel = getBadgeLabel(s.typeAffichage, s.type);
        
        return `
          <tr>
            <td><span class="badge ${badgeClass}">${badgeLabel}</span>${s.sigle}</td>
            <td class="number">${formatNumber(s.effectif_total)}</td>
            <td class="number">${formatNumber(s.effectif_su)}</td>
            <td class="number">${formatNumber(s.effectif_agco)}</td>
            <td class="number">${formatNumber(s.effectif_autres)}</td>
            <td class="number">${s.age_moyen.toFixed(1)} ans</td>
            <td class="number">${formatMilliers(s.masse_salariale)} k€</td>
            <td class="number">${formatEuro(s.ms_par_agent)}</td>
          </tr>
        `;
      }).join('');
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon bg-rh">👥</div>
            <h2>Ressources Humaines</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th class="number">Effectif Total</th>
                <th class="number">Effectif SU</th>
                <th class="number">Effectif AGCO</th>
                <th class="number">Effectif Autres</th>
                <th class="number">Âge Moyen</th>
                <th class="number">Masse Salariale</th>
                <th class="number">MS / Agent</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr class="row-total">
                <td>TOTAL</td>
                <td class="number">${formatNumber(totaux.effectif_total)}</td>
                <td class="number">${formatNumber(totaux.effectif_su)}</td>
                <td class="number">${formatNumber(totaux.effectif_agco)}</td>
                <td class="number">${formatNumber(totaux.effectif_autres)}</td>
                <td class="number">${totaux.age_moyen.toFixed(1)} ans</td>
                <td class="number">${formatMilliers(totaux.masse_salariale)} k€</td>
                <td class="number">${formatEuro(totaux.ms_par_agent)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function renderVehiculesSection(structures, totaux) {
      const rows = structures.map(s => {
        const badgeClass = getBadgeClass(s.typeAffichage);
        const badgeLabel = getBadgeLabel(s.typeAffichage, s.type);
        
        return `
          <tr>
            <td><span class="badge ${badgeClass}">${badgeLabel}</span>${s.sigle}</td>
            <td class="number">${formatNumber(s.nb_vehicules)}</td>
            <td class="number">${formatNumber(s.nb_vetustes)}</td>
            <td class="number">${s.ratio_vehicule_agent.toFixed(3)}</td>
            <td class="number">${s.ratio_vehicule_su.toFixed(3)}</td>
            <td class="number">${formatEuro(s.cout_fonct_vehicule)}</td>
          </tr>
        `;
      }).join('');
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon bg-vehicules">🚗</div>
            <h2>Parc Véhicules</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th class="number">Nb Véhicules</th>
                <th class="number">Véhicules Vétustes</th>
                <th class="number">Ratio / Agent</th>
                <th class="number">Ratio / Agent SU</th>
                <th class="number">Coût Fonct. / Véhicule</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr class="row-total">
                <td>TOTAL</td>
                <td class="number">${formatNumber(totaux.nb_vehicules)}</td>
                <td class="number">${formatNumber(totaux.nb_vetustes)}</td>
                <td class="number">${totaux.ratio_vehicule_agent.toFixed(3)}</td>
                <td class="number">${totaux.ratio_vehicule_su.toFixed(3)}</td>
                <td class="number">${formatEuro(totaux.cout_fonct_vehicule)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function renderFraisMissionSection(structures, totaux) {
      const rows = structures.map(s => {
        const badgeClass = getBadgeClass(s.typeAffichage);
        const badgeLabel = getBadgeLabel(s.typeAffichage, s.type);
        
        return `
          <tr>
            <td><span class="badge ${badgeClass}">${badgeLabel}</span>${s.sigle}</td>
            <td>
              <div class="percent-bar-container">
                ${renderPercentBar(s.transport, s.hebergement, s.repas)}
              </div>
            </td>
            <td class="number">${formatMilliers(s.formation)} k€</td>
            <td class="number">${formatMilliers(s.autres_missions)} k€</td>
            <td class="number">${formatEuro(s.frais_par_agent)}</td>
          </tr>
        `;
      }).join('');
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon bg-missions">✈️</div>
            <h2>Frais de Mission</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th style="width: 35%;">Répartition T/H/R</th>
                <th class="number">Total Formation</th>
                <th class="number">Total Autres Missions</th>
                <th class="number">Frais Moyen / Agent</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr class="row-total">
                <td>TOTAL</td>
                <td>
                  <div class="percent-bar-container">
                    ${renderPercentBar(totaux.transport, totaux.hebergement, totaux.repas)}
                  </div>
                </td>
                <td class="number">${formatMilliers(totaux.formation)} k€</td>
                <td class="number">${formatMilliers(totaux.autres_missions)} k€</td>
                <td class="number">${formatEuro(totaux.frais_par_agent)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function renderInformatiqueSection(structures, totaux) {
      const rows = structures.map(s => {
        const badgeClass = getBadgeClass(s.typeAffichage);
        const badgeLabel = getBadgeLabel(s.typeAffichage, s.type);
        
        return `
          <tr>
            <td><span class="badge ${badgeClass}">${badgeLabel}</span>${s.sigle}</td>
            <td class="number">${formatNumber(s.postes_fixes)}</td>
            <td class="number">${formatNumber(s.portables)}</td>
            <td class="number">${formatMilliers(s.budget_it)} k€</td>
            <td class="number">${formatMilliers(s.budget_it_4ans)} k€</td>
            <td class="number">${formatEuro(s.it_par_agent)}</td>
            <td class="number">${formatEuro(s.it_par_agent_lisse)}</td>
          </tr>
        `;
      }).join('');
      
      return `
