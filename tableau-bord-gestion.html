<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de Bord de Gestion - DGDDI</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      padding: 20px;
      color: #2d3748;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 8px;
      padding: 25px 35px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
    }

    .header-content h1 {
      font-size: 28px;
      color: #1e3a8a;
      margin-bottom: 5px;
    }

    .header-content p {
      color: #64748b;
      font-size: 14px;
    }

    .section {
      background: white;
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 3px solid #e2e8f0;
    }

    .section-icon {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }

    .section-header h2 {
      font-size: 22px;
      color: #1e293b;
      font-weight: 600;
    }

    /* Couleurs thématiques */
    .bg-rh { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .bg-vehicules { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    .bg-missions { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .bg-it { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }

    /* Tableaux */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    thead th {
      background: #f8fafc;
      padding: 14px 12px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #e2e8f0;
    }

    thead th:first-child {
      border-top-left-radius: 8px;
    }

    thead th:last-child {
      border-top-right-radius: 8px;
    }

    tbody tr {
      border-bottom: 1px solid #f1f5f9;
      transition: background-color 0.2s;
    }

    tbody tr:hover {
      background-color: #f8fafc;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody td {
      padding: 14px 12px;
      font-size: 14px;
      color: #334155;
    }

    tbody td:first-child {
      font-weight: 600;
      color: #1e293b;
    }

    .number {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .percent-bar-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .percent-bar {
      flex: 1;
      height: 24px;
      background: #f1f5f9;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
    }

    .bar-segment {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
      transition: all 0.3s;
    }

    .bar-transport { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    .bar-hebergement { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .bar-repas { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }

    .percent-label {
      font-size: 13px;
      color: #64748b;
      min-width: 50px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
      font-size: 18px;
    }

    .error {
      background: #fee;
      color: #c00;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #c00;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
      text-transform: uppercase;
    }

    .badge-dg { background: #dbeafe; color: #1e40af; }
    .badge-di { background: #d1fae5; color: #065f46; }
    .badge-scn { background: #fef3c7; color: #92400e; }
    .badge-dr { background: #e0e7ff; color: #3730a3; }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        text-align: center;
      }

      table {
        font-size: 12px;
      }

      thead th, tbody td {
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">DG</div>
      <div class="header-content">
        <h1>Tableau de Bord de Gestion</h1>
        <p>Direction Générale des Douanes et Droits Indirects • Synthèse 2024</p>
      </div>
    </div>

    <div id="loading" class="loading">Chargement des données...</div>
    <div id="content" style="display: none;"></div>
  </div>

  <script>
    const FICHE_STATE = {
      data: {
        structures: null,
        rh: null,
        vehicules: null,
        frais_mission: null,
        informatique: null,
        consolidation: null
      }
    };

    let ANNEE = 2024;

    async function loadAllData() {
      const tables = ['Structures', 'RH', 'Vehicules', 'Frais_Mission', 'Informatique', 'Consolidation'];
      
      for (const tableName of tables) {
        try {
          const records = await grist.docApi.fetchTable(tableName);
          const key = tableName.toLowerCase();
          FICHE_STATE.data[key] = records;
          console.log(`✓ ${tableName}:`, records.id?.length || 0, 'lignes');
        } catch (err) {
          console.warn(`Table ${tableName} non disponible:`, err);
        }
      }
    }

    function getDerniereAnnee() {
      const rh = FICHE_STATE.data.rh;
      if (!rh || !rh.Annee) return 2024;
      const annees = [...new Set(rh.Annee.filter(a => a > 0))];
      return Math.max(...annees);
    }

    function getConsolidationData(perimetre, annee) {
      const conso = FICHE_STATE.data.consolidation;
      if (!conso || !conso.Perimetre || !conso.id) return null;
      
      const idx = conso.id.findIndex((id, i) => 
        conso.Perimetre[i] === perimetre && conso.Annee[i] === annee
      );
      
      if (idx === -1) return null;
      
      return {
        nb_structures: conso.Nb_Structures?.[idx] || 0,
        
        // RH
        total_effectif: conso.Total_Effectif?.[idx] || 0,
        total_effectif_agco: conso.Total_Effectif_AGCO?.[idx] || 0,
        total_effectif_su: conso.Total_Effectif_SU?.[idx] || 0,
        total_effectif_autres: (conso.Total_Effectif?.[idx] || 0) - (conso.Total_Effectif_AGCO?.[idx] || 0) - (conso.Total_Effectif_SU?.[idx] || 0),
        effectif_moyen: conso.Effectif_Moyen_Par_Structure?.[idx] || 0,
        age_moyen_global: conso.Age_Moyen_Global?.[idx] || 0,
        total_masse_salariale: conso.Total_Masse_Salariale?.[idx] || 0,
        ms_par_agent: conso.Moyenne_MS_Par_Agent?.[idx] || 0,
        
        // Véhicules
        moy_nb_vehicules: conso.Moy_Nb_Vehicules?.[idx] || 0,
        moy_nb_vetustes: conso.Moy_Nb_Vehicules_Vetustes?.[idx] || 0,
        moy_ratio_vehicule_agent: conso.Moy_Ratio_Vehicule_Agent?.[idx] || 0,
        moy_ratio_vehicule_su: conso.Moy_Ratio_Vehicule_SU?.[idx] || 0,
        moy_cout_fonct_vehicule: conso.Moy_Cout_Fonctionnement_Par_Vehicule?.[idx] || 0,
        
        // Frais de mission
        moy_transport: conso.Moy_Transport?.[idx] || 0,
        moy_hebergement: conso.Moy_Hebergement?.[idx] || 0,
        moy_repas: conso.Moy_Repas?.[idx] || 0,
        total_formation: conso.Total_Formation?.[idx] || 0,
        total_autres_missions: conso.Total_Autres_Missions?.[idx] || 0,
        moy_frais_par_agent: conso.Moy_Frais_Mission_Par_Agent?.[idx] || 0,
        
        // Informatique
        moy_postes_fixes: conso.Moy_Postes_Fixes?.[idx] || 0,
        moy_portables: conso.Moy_Portables?.[idx] || 0,
        moy_budget_it: conso.Moy_Budget_IT_CP?.[idx] || 0,
        moy_budget_it_4ans: conso.Moy_Budget_IT_4ans?.[idx] || 0,
        moy_it_par_agent: conso.Moy_IT_Par_Agent?.[idx] || 0,
        moy_it_par_agent_lisse: conso.Moy_IT_Par_Agent_Lisse?.[idx] || 0
      };
    }

    function formatNumber(num) {
      if (!num && num !== 0) return '—';
      return Math.round(num).toLocaleString('fr-FR');
    }

    function formatMilliers(num) {
      if (!num && num !== 0) return '—';
      return (num / 1000).toFixed(0);
    }

    function formatEuro(num) {
      if (!num && num !== 0) return '—';
      return Math.round(num).toLocaleString('fr-FR') + ' €';
    }

    // Récupérer les données d'une structure individuelle
    function getStructureData(structureId, annee) {
      const rh = FICHE_STATE.data.rh;
      if (!rh || !rh.Structure) return null;
      
      const indices = [];
      for (let i = 0; i < rh.Structure.length; i++) {
        if (rh.Structure[i] === structureId && rh.Annee[i] === annee) {
          indices.push(i);
        }
      }
      
      if (indices.length === 0) return null;
      
      // Agréger les données de toutes les lignes trouvées
      let effectif_total = 0, effectif_su = 0, effectif_agco = 0, effectif_autres = 0;
      let masse_salariale = 0;
      let sumAge = 0, totalEffectifAge = 0;
      
      indices.forEach(i => {
        effectif_total += rh.Effectif_Total?.[i] || 0;
        effectif_su += rh.Effectif_SU?.[i] || 0;
        effectif_agco += rh.Effectif_AGCO?.[i] || 0;
        effectif_autres += rh.Effectif_Autres?.[i] || 0;
        masse_salariale += rh.Masse_Salariale?.[i] || 0;
        
        const eff = rh.Effectif_Total?.[i] || 0;
        const age = rh.Age_Moyen?.[i] || 0;
        if (eff > 0 && age > 0) {
          sumAge += age * eff;
          totalEffectifAge += eff;
        }
      });
      
      const age_moyen = totalEffectifAge > 0 ? sumAge / totalEffectifAge : 0;
      const ms_par_agent = effectif_total > 0 ? masse_salariale / effectif_total : 0;
      
      return {
        effectif_total,
        effectif_su,
        effectif_agco,
        effectif_autres,
        age_moyen,
        masse_salariale,
        ms_par_agent
      };
    }

    // Récupérer toutes les structures affichables
    function getAllStructuresData() {
      const structures = FICHE_STATE.data.structures;
      if (!structures || !structures.id) {
        console.error('❌ Pas de données structures');
        return [];
      }
      
      console.log('📊 Nombre total de structures:', structures.id.length);
      
      const result = [];
      
      for (let i = 0; i < structures.id.length; i++) {
        const structId = structures.id[i];
        const type = structures.Type?.[i];
        const sigle = structures.Sigle?.[i];
        const nom = structures.Nom?.[i];
        
        console.log(`Structure ${i}: Type=${type}, Sigle=${sigle}`);
        
        // SOLUTION ACTUELLE (sans nouvelle colonne Grist) :
        // Filtrer selon les règles métier
        
        // 1. Toujours afficher : DG, SCN
        const isAlwaysDisplayed = ['DG', 'SCN'].includes(type);
        
        // 2. Toujours afficher : toutes les DI
        const isDI = type === 'DI';
        
        // 3. Afficher les DR outremer : 971, 972, 973 (Antilles) + 974, 976, 987, 988
        const isDROutremer = type === 'DR' && ['971', '972', '973', '974', '976', '987', '988'].some(code => sigle?.includes(code));
        
        console.log(`  → isAlwaysDisplayed=${isAlwaysDisplayed}, isDI=${isDI}, isDROutremer=${isDROutremer}`);
        
        // Si ce n'est pas une structure à afficher, on passe
        if (!isAlwaysDisplayed && !isDI && !isDROutremer) {
          console.log(`  ✖ Structure ignorée`);
          continue;
        }
        
        const data = getStructureData(structId, ANNEE);
        if (!data) {
          console.warn(`  ⚠️ Pas de données RH pour ${sigle} en ${ANNEE}`);
          continue;
        }
        
        console.log(`  ✓ Structure ajoutée: ${sigle}, effectif=${data.effectif_total}`);
        
        // Pour les DI, calculer l'agrégation des DR rattachées (sauf 971, 972, 973 qui sont affichées séparément)
        let drData = null;
        if (isDI) {
          const drList = getDRForDI(structId, sigle);
          console.log(`  → DR rattachées à ${sigle}:`, drList.length);
          if (drList.length > 0) {
            drData = {
              count: drList.length,
              effectif_total: 0,
              effectif_su: 0,
              effectif_agco: 0,
              effectif_autres: 0,
              masse_salariale: 0,
              sumAge: 0,
              totalEffectif: 0
            };
            
            drList.forEach(dr => {
              const drRhData = getStructureData(dr.id, ANNEE);
              if (drRhData) {
                drData.effectif_total += drRhData.effectif_total;
                drData.effectif_su += drRhData.effectif_su;
                drData.effectif_agco += drRhData.effectif_agco;
                drData.effectif_autres += drRhData.effectif_autres;
                drData.masse_salariale += drRhData.masse_salariale;
                drData.sumAge += drRhData.age_moyen * drRhData.effectif_total;
                drData.totalEffectif += drRhData.effectif_total;
                console.log(`    • DR ${dr.sigle}: effectif=${drRhData.effectif_total}`);
              }
            });
            
            drData.age_moyen = drData.totalEffectif > 0 ? drData.sumAge / drData.totalEffectif : 0;
            drData.ms_par_agent = drData.effectif_total > 0 ? drData.masse_salariale / drData.effectif_total : 0;
          }
        }
        
        result.push({
          id: structId,
          type,
          sigle,
          nom,
          drData,
          ...data
        });
      }
      
      console.log('✅ Total structures affichées:', result.length);
      
      // Trier : DG > DI > DR outremer > SCN
      result.sort((a, b) => {
        const order = { 'DG': 0, 'DI': 1, 'DR': 2, 'SCN': 3 };
        const orderA = order[a.type] || 99;
        const orderB = order[b.type] || 99;
        if (orderA !== orderB) return orderA - orderB;
        return (a.sigle || '').localeCompare(b.sigle || '');
      });
      
      return result;
    }

    // Récupérer les DR rattachées à une DI (SAUF 971, 972, 973 qui sont affichées séparément)
    function getDRForDI(diId, diSigle) {
      const structures = FICHE_STATE.data.structures;
      if (!structures || !structures.id) return [];
      
      const drList = [];
      
      for (let i = 0; i < structures.id.length; i++) {
        const type = structures.Type?.[i];
        const sigle = structures.Sigle?.[i];
        const rattachement = structures.Rattachement_DI?.[i];
        
        if (type !== 'DR') continue;
        
        // Exclure les DR Antilles (971, 972, 973) car elles sont affichées séparément
        if (['971', '972', '973'].some(code => sigle?.includes(code))) {
          continue;
        }
        
        // Inclure seulement les DR avec rattachement
        if (rattachement === diId) {
          drList.push({
            id: structures.id[i],
            sigle: sigle,
            nom: structures.Nom?.[i]
          });
        }
      }
      
      return drList;
    }

    function renderRHSection() {
      const structures = getAllStructuresData();
      
      if (structures.length === 0) {
        return '<div class="section"><p>Aucune donnée RH disponible</p></div>';
      }
      
      // Calculer le total
      let total_effectif = 0, total_su = 0, total_agco = 0, total_autres = 0;
      let total_ms = 0, total_eff_age = 0, sum_age = 0;
      
      structures.forEach(s => {
        total_effectif += s.effectif_total;
        total_su += s.effectif_su;
        total_agco += s.effectif_agco;
        total_autres += s.effectif_autres;
        total_ms += s.masse_salariale;
        sum_age += s.age_moyen * s.effectif_total;
        total_eff_age += s.effectif_total;
        
        // Ajouter les DR si DI
        if (s.drData) {
          total_effectif += s.drData.effectif_total;
          total_su += s.drData.effectif_su;
          total_agco += s.drData.effectif_agco;
          total_autres += s.drData.effectif_autres;
          total_ms += s.drData.masse_salariale;
          sum_age += s.drData.sumAge;
          total_eff_age += s.drData.totalEffectif;
        }
      });
      
      const age_moyen_total = total_eff_age > 0 ? sum_age / total_eff_age : 0;
      const ms_par_agent_total = total_effectif > 0 ? total_ms / total_effectif : 0;
      
      const rows = structures.map(s => {
        const badgeClass = s.type === 'DG' ? 'badge-dg' : (s.type === 'DI' ? 'badge-di' : 'badge-scn');
        const badge = `<span class="badge ${badgeClass}">${s.type}</span>`;
        
        let rowHTML = `
          <tr>
            <td>${badge} ${s.sigle}</td>
            <td class="number">${formatNumber(s.effectif_total)}</td>
            <td class="number">${formatNumber(s.effectif_su)}</td>
            <td class="number">${formatNumber(s.effectif_agco)}</td>
            <td class="number">${formatNumber(s.effectif_autres)}</td>
            <td class="number">${s.age_moyen.toFixed(1)} ans</td>
            <td class="number">${formatMilliers(s.masse_salariale)} k€</td>
            <td class="number">${formatEuro(s.ms_par_agent)}</td>
          </tr>
        `;
        
        // Si DI avec des DR, ajouter une ligne pour les DR
        if (s.drData && s.drData.count > 0) {
          rowHTML += `
          <tr style="background: #f8fafc; font-size: 13px; color: #64748b;">
            <td style="padding-left: 30px;">└─ ${s.drData.count} DR rattachée(s)</td>
            <td class="number">${formatNumber(s.drData.effectif_total)}</td>
            <td class="number">${formatNumber(s.drData.effectif_su)}</td>
            <td class="number">${formatNumber(s.drData.effectif_agco)}</td>
            <td class="number">${formatNumber(s.drData.effectif_autres)}</td>
            <td class="number">${s.drData.age_moyen.toFixed(1)} ans</td>
            <td class="number">${formatMilliers(s.drData.masse_salariale)} k€</td>
            <td class="number">${formatEuro(s.drData.ms_par_agent)}</td>
          </tr>
          `;
        }
        
        return rowHTML;
      }).join('');
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon bg-rh">👥</div>
            <h2>Ressources Humaines</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th class="number">Effectif Total</th>
                <th class="number">Effectif SU</th>
                <th class="number">Effectif AGCO</th>
                <th class="number">Effectif Autres</th>
                <th class="number">Âge Moyen</th>
                <th class="number">Masse Salariale</th>
                <th class="number">MS / Agent</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr style="font-weight: bold; background: #f8fafc; border-top: 2px solid #cbd5e1;">
                <td>TOTAL</td>
                <td class="number">${formatNumber(total_effectif)}</td>
                <td class="number">${formatNumber(total_su)}</td>
                <td class="number">${formatNumber(total_agco)}</td>
                <td class="number">${formatNumber(total_autres)}</td>
                <td class="number">${age_moyen_total.toFixed(1)} ans</td>
                <td class="number">${formatMilliers(total_ms)} k€</td>
                <td class="number">${formatEuro(ms_par_agent_total)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function getVehiculeDataForStructure(structureId, annee) {
      const veh = FICHE_STATE.data.vehicules;
      if (!veh || !veh.Structure) {
        console.warn('⚠️ Table véhicules non disponible');
        return null;
      }
      
      let nb_vehicules = 0, nb_vetustes = 0, budget_vehicules = 0;
      
      for (let i = 0; i < veh.Structure.length; i++) {
        if (veh.Structure[i] === structureId && veh.Annee[i] === annee) {
          nb_vehicules += veh.Nombre_Vehicules?.[i] || 0;
          if (veh.Est_Vetuste?.[i]) nb_vetustes++;
          budget_vehicules += veh.Budget_Vehicules?.[i] || 0;
        }
      }
      
      console.log(`🚗 Véhicules ${structureId} (${annee}): ${nb_vehicules} véhicules, ${nb_vetustes} vétustes`);
      
      return { nb_vehicules, nb_vetustes, budget_vehicules };
    }

    function getDRVehiculeData(diId, diSigle, annee) {
      const drList = getDRForDI(diId, diSigle);
      let total_vehicules = 0, total_vetustes = 0, total_budget = 0;
      
      drList.forEach(dr => {
        const vehData = getVehiculeDataForStructure(dr.id, annee);
        if (vehData) {
          total_vehicules += vehData.nb_vehicules;
          total_vetustes += vehData.nb_vetustes;
          total_budget += vehData.budget_vehicules;
        }
      });
      
      return drList.length > 0 ? { nb_vehicules: total_vehicules, nb_vetustes: total_vetustes, budget_vehicules: total_budget, count: drList.length } : null;
    }

    function renderVehiculesSection() {
      const structures = getAllStructuresData();
      
      if (structures.length === 0) {
        return '<div class="section"><p>Aucune donnée véhicules disponible</p></div>';
      }
      
      // Calculer totaux
      let total_vehicules = 0, total_vetustes = 0, total_budget = 0;
      let total_effectif = 0, total_su = 0;
      
      const rows = structures.map(s => {
        const vehData = getVehiculeDataForStructure(s.id, ANNEE) || { nb_vehicules: 0, nb_vetustes: 0, budget_vehicules: 0 };
        
        const ratio_agent = s.effectif_total > 0 ? (vehData.nb_vehicules / s.effectif_total) : 0;
        const ratio_su = s.effectif_su > 0 ? (vehData.nb_vehicules / s.effectif_su) : 0;
        const cout_par_vehicule = vehData.nb_vehicules > 0 ? (vehData.budget_vehicules / vehData.nb_vehicules) : 0;
        
        total_vehicules += vehData.nb_vehicules;
        total_vetustes += vehData.nb_vetustes;
        total_budget += vehData.budget_vehicules;
        total_effectif += s.effectif_total;
        total_su += s.effectif_su;
        
        const badgeClass = s.type === 'DG' ? 'badge-dg' : (s.type === 'DI' ? 'badge-di' : 'badge-scn');
        const badge = `<span class="badge ${badgeClass}">${s.type}</span>`;
        
        let rowHTML = `
          <tr>
            <td>${badge} ${s.sigle}</td>
            <td class="number">${formatNumber(vehData.nb_vehicules)}</td>
            <td class="number">${formatNumber(vehData.nb_vetustes)}</td>
            <td class="number">${ratio_agent.toFixed(2)}</td>
            <td class="number">${ratio_su.toFixed(2)}</td>
            <td class="number">${formatEuro(cout_par_vehicule)}</td>
          </tr>
        `;
        
        // Si DI, ajouter les DR
        if (s.type === 'DI' && s.drData) {
          const drVehData = getDRVehiculeData(s.id, s.sigle, ANNEE);
          if (drVehData && drVehData.count > 0) {
            const dr_ratio_agent = s.drData.effectif_total > 0 ? (drVehData.nb_vehicules / s.drData.effectif_total) : 0;
            const dr_ratio_su = s.drData.effectif_su > 0 ? (drVehData.nb_vehicules / s.drData.effectif_su) : 0;
            const dr_cout_par_vehicule = drVehData.nb_vehicules > 0 ? (drVehData.budget_vehicules / drVehData.nb_vehicules) : 0;
            
            total_vehicules += drVehData.nb_vehicules;
            total_vetustes += drVehData.nb_vetustes;
            total_budget += drVehData.budget_vehicules;
            
            rowHTML += `
          <tr style="background: #f8fafc; font-size: 13px; color: #64748b;">
            <td style="padding-left: 30px;">└─ ${drVehData.count} DR rattachée(s)</td>
            <td class="number">${formatNumber(drVehData.nb_vehicules)}</td>
            <td class="number">${formatNumber(drVehData.nb_vetustes)}</td>
            <td class="number">${dr_ratio_agent.toFixed(2)}</td>
            <td class="number">${dr_ratio_su.toFixed(2)}</td>
            <td class="number">${formatEuro(dr_cout_par_vehicule)}</td>
          </tr>
            `;
          }
        }
        
        return rowHTML;
      }).join('');
      
      const total_ratio_agent = total_effectif > 0 ? (total_vehicules / total_effectif) : 0;
      const total_ratio_su = total_su > 0 ? (total_vehicules / total_su) : 0;
      const total_cout_par_vehicule = total_vehicules > 0 ? (total_budget / total_vehicules) : 0;
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon bg-vehicules">🚗</div>
            <h2>Parc Véhicules</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th class="number">Nb Véhicules</th>
                <th class="number">Véhicules Vétustes</th>
                <th class="number">Ratio / Agent</th>
                <th class="number">Ratio / Agent SU</th>
                <th class="number">Coût Fonct. / Véhicule</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr style="font-weight: bold; background: #f8fafc; border-top: 2px solid #cbd5e1;">
                <td>TOTAL</td>
                <td class="number">${formatNumber(total_vehicules)}</td>
                <td class="number">${formatNumber(total_vetustes)}</td>
                <td class="number">${total_ratio_agent.toFixed(2)}</td>
                <td class="number">${total_ratio_su.toFixed(2)}</td>
                <td class="number">${formatEuro(total_cout_par_vehicule)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function getFraisMissionDataForStructure(structureId, annee) {
      const fm = FICHE_STATE.data.frais_mission;
      if (!fm || !fm.Structure) {
        console.warn('⚠️ Table frais_mission non disponible');
        return null;
      }
      
      let transport = 0, hebergement = 0, repas = 0, formation = 0, autres = 0;
      
      for (let i = 0; i < fm.Structure.length; i++) {
        if (fm.Structure[i] === structureId && fm.Annee[i] === annee) {
          transport += fm.Transport?.[i] || 0;
          hebergement += fm.Hebergement?.[i] || 0;
          repas += fm.Repas?.[i] || 0;
          formation += fm.Formation?.[i] || 0;
          autres += fm.Autres_Missions?.[i] || 0;
        }
      }
      
      console.log(`✈️ Frais mission ${structureId} (${annee}): T=${transport}, H=${hebergement}, R=${repas}`);
      
      return { transport, hebergement, repas, formation, autres };
    }

    function getDRFraisMissionData(diId, diSigle, annee) {
      const drList = getDRForDI(diId, diSigle);
      let total_transport = 0, total_hebergement = 0, total_repas = 0, total_formation = 0, total_autres = 0;
      
      drList.forEach(dr => {
        const fmData = getFraisMissionDataForStructure(dr.id, annee);
        if (fmData) {
          total_transport += fmData.transport;
          total_hebergement += fmData.hebergement;
          total_repas += fmData.repas;
          total_formation += fmData.formation;
          total_autres += fmData.autres;
        }
      });
      
      return drList.length > 0 ? { transport: total_transport, hebergement: total_hebergement, repas: total_repas, formation: total_formation, autres: total_autres, count: drList.length } : null;
    }

    function renderFraisMissionSection() {
      const structures = getAllStructuresData();
      
      if (structures.length === 0) {
        return '<div class="section"><p>Aucune donnée frais de mission disponible</p></div>';
      }
      
      function renderPercentBar(transport, hebergement, repas) {
        const total = transport + hebergement + repas;
        if (total === 0) return '<div class="percent-bar"></div><span class="percent-label">—</span>';
        
        const pctTransport = (transport / total * 100).toFixed(1);
        const pctHebergement = (hebergement / total * 100).toFixed(1);
        const pctRepas = (repas / total * 100).toFixed(1);
        
        return `
          <div class="percent-bar">
            ${transport > 0 ? `<div class="bar-segment bar-transport" style="width: ${pctTransport}%">${pctTransport}%</div>` : ''}
            ${hebergement > 0 ? `<div class="bar-segment bar-hebergement" style="width: ${pctHebergement}%">${pctHebergement}%</div>` : ''}
            ${repas > 0 ? `<div class="bar-segment bar-repas" style="width: ${pctRepas}%">${pctRepas}%</div>` : ''}
          </div>
          <span class="percent-label">${formatMilliers(total)} k€</span>
        `;
      }
      
      // Calculer totaux
      let total_transport = 0, total_hebergement = 0, total_repas = 0;
      let total_formation = 0, total_autres = 0, total_effectif = 0;
      
      const rows = structures.map(s => {
        const fmData = getFraisMissionDataForStructure(s.id, ANNEE) || { transport: 0, hebergement: 0, repas: 0, formation: 0, autres: 0 };
        
        const frais_par_agent = s.effectif_total > 0 ? ((fmData.transport + fmData.hebergement + fmData.repas) / s.effectif_total) : 0;
        
        total_transport += fmData.transport;
        total_hebergement += fmData.hebergement;
        total_repas += fmData.repas;
        total_formation += fmData.formation;
        total_autres += fmData.autres;
        total_effectif += s.effectif_total;
        
        const badgeClass = s.type === 'DG' ? 'badge-dg' : (s.type === 'DI' ? 'badge-di' : 'badge-scn');
        const badge = `<span class="badge ${badgeClass}">${s.type}</span>`;
        
        let rowHTML = `
          <tr>
            <td>${badge} ${s.sigle}</td>
            <td>
              <div class="percent-bar-container">
                ${renderPercentBar(fmData.transport, fmData.hebergement, fmData.repas)}
              </div>
            </td>
            <td class="number">${formatMilliers(fmData.formation)} k€</td>
            <td class="number">${formatMilliers(fmData.autres)} k€</td>
            <td class="number">${formatEuro(frais_par_agent)}</td>
          </tr>
        `;
        
        // Si DI, ajouter les DR
        if (s.type === 'DI' && s.drData) {
          const drFmData = getDRFraisMissionData(s.id, s.sigle, ANNEE);
          if (drFmData && drFmData.count > 0) {
            const dr_frais_par_agent = s.drData.effectif_total > 0 ? ((drFmData.transport + drFmData.hebergement + drFmData.repas) / s.drData.effectif_total) : 0;
            
            total_transport += drFmData.transport;
            total_hebergement += drFmData.hebergement;
            total_repas += drFmData.repas;
            total_formation += drFmData.formation;
            total_autres += drFmData.autres;
            
            rowHTML += `
          <tr style="background: #f8fafc; font-size: 13px; color: #64748b;">
            <td style="padding-left: 30px;">└─ ${drFmData.count} DR rattachée(s)</td>
            <td>
              <div class="percent-bar-container">
                ${renderPercentBar(drFmData.transport, drFmData.hebergement, drFmData.repas)}
              </div>
            </td>
            <td class="number">${formatMilliers(drFmData.formation)} k€</td>
            <td class="number">${formatMilliers(drFmData.autres)} k€</td>
            <td class="number">${formatEuro(dr_frais_par_agent)}</td>
          </tr>
            `;
          }
        }
        
        return rowHTML;
      }).join('');
      
      const total_frais_par_agent = total_effectif > 0 ? ((total_transport + total_hebergement + total_repas) / total_effectif) : 0;
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon bg-missions">✈️</div>
            <h2>Frais de Mission</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th style="width: 35%;">Répartition T/H/R</th>
                <th class="number">Total Formation</th>
                <th class="number">Total Autres Missions</th>
                <th class="number">Frais Moyen / Agent</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr style="font-weight: bold; background: #f8fafc; border-top: 2px solid #cbd5e1;">
                <td>TOTAL</td>
                <td>
                  <div class="percent-bar-container">
                    ${renderPercentBar(total_transport, total_hebergement, total_repas)}
                  </div>
                </td>
                <td class="number">${formatMilliers(total_formation)} k€</td>
                <td class="number">${formatMilliers(total_autres)} k€</td>
                <td class="number">${formatEuro(total_frais_par_agent)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function getInformatiqueDataForStructure(structureId, annee) {
      const it = FICHE_STATE.data.informatique;
      if (!it || !it.Structure) {
        console.warn('⚠️ Table informatique non disponible');
        return null;
      }
      
      let postes_fixes = 0, portables = 0;
      const budgets = [];
      
      for (let i = 0; i < it.Structure.length; i++) {
        if (it.Structure[i] === structureId && it.Annee[i] === annee) {
          postes_fixes += it.Postes_Fixes?.[i] || 0;
          portables += it.Portables?.[i] || 0;
          budgets.push(it.Budget_IT_CP?.[i] || 0);
        }
      }
      
      const budget_annee = budgets.reduce((a, b) => a + b, 0);
      
      console.log(`💻 IT ${structureId} (${annee}): ${postes_fixes} fixes, ${portables} portables, budget=${budget_annee}`);
      
      // Budget moyen sur 4 ans : chercher les années précédentes
      let budget_4ans = budget_annee;
      let nb_annees = 1;
      
      for (let y = annee - 1; y >= annee - 3 && nb_annees < 4; y--) {
        for (let i = 0; i < it.Structure.length; i++) {
          if (it.Structure[i] === structureId && it.Annee[i] === y) {
            budget_4ans += it.Budget_IT_CP?.[i] || 0;
            nb_annees++;
            break;
          }
        }
      }
      
      const budget_moyen_4ans = nb_annees > 0 ? budget_4ans / nb_annees : budget_annee;
      
      return { postes_fixes, portables, budget_annee, budget_moyen_4ans };
    }

    function getDRInformatiqueData(diId, diSigle, annee) {
      const drList = getDRForDI(diId, diSigle);
      let total_fixes = 0, total_portables = 0, total_budget = 0, total_budget_4ans = 0;
      
      drList.forEach(dr => {
        const itData = getInformatiqueDataForStructure(dr.id, annee);
        if (itData) {
          total_fixes += itData.postes_fixes;
          total_portables += itData.portables;
          total_budget += itData.budget_annee;
          total_budget_4ans += itData.budget_moyen_4ans;
        }
      });
      
      return drList.length > 0 ? { postes_fixes: total_fixes, portables: total_portables, budget_annee: total_budget, budget_moyen_4ans: total_budget_4ans, count: drList.length } : null;
    }

    function renderInformatiqueSection() {
      const structures = getAllStructuresData();
      
      if (structures.length === 0) {
        return '<div class="section"><p>Aucune donnée informatique disponible</p></div>';
      }
      
      // Calculer totaux
      let total_fixes = 0, total_portables = 0, total_budget = 0, total_budget_4ans = 0;
      let total_effectif = 0;
      
      const rows = structures.map(s => {
        const itData = getInformatiqueDataForStructure(s.id, ANNEE) || { postes_fixes: 0, portables: 0, budget_annee: 0, budget_moyen_4ans: 0 };
        
        const cout_par_agent = s.effectif_total > 0 ? (itData.budget_annee / s.effectif_total) : 0;
        const cout_par_agent_lisse = s.effectif_total > 0 ? (itData.budget_moyen_4ans / s.effectif_total) : 0;
        
        total_fixes += itData.postes_fixes;
        total_portables += itData.portables;
        total_budget += itData.budget_annee;
        total_budget_4ans += itData.budget_moyen_4ans;
        total_effectif += s.effectif_total;
        
        const badgeClass = s.type === 'DG' ? 'badge-dg' : (s.type === 'DI' ? 'badge-di' : 'badge-scn');
        const badge = `<span class="badge ${badgeClass}">${s.type}</span>`;
        
        let rowHTML = `
          <tr>
            <td>${badge} ${s.sigle}</td>
            <td class="number">${formatNumber(itData.postes_fixes)}</td>
            <td class="number">${formatNumber(itData.portables)}</td>
            <td class="number">${formatMilliers(itData.budget_annee)} k€</td>
            <td class="number">${formatMilliers(itData.budget_moyen_4ans)} k€</td>
            <td class="number">${formatEuro(cout_par_agent)}</td>
            <td class="number">${formatEuro(cout_par_agent_lisse)}</td>
          </tr>
        `;
        
        // Si DI, ajouter les DR
        if (s.type === 'DI' && s.drData) {
          const drItData = getDRInformatiqueData(s.id, s.sigle, ANNEE);
          if (drItData && drItData.count > 0) {
            const dr_cout_par_agent = s.drData.effectif_total > 0 ? (drItData.budget_annee / s.drData.effectif_total) : 0;
            const dr_cout_par_agent_lisse = s.drData.effectif_total > 0 ? (drItData.budget_moyen_4ans / s.drData.effectif_total) : 0;
            
            total_fixes += drItData.postes_fixes;
            total_portables += drItData.portables;
            total_budget += drItData.budget_annee;
            total_budget_4ans += drItData.budget_moyen_4ans;
            
            rowHTML += `
          <tr style="background: #f8fafc; font-size: 13px; color: #64748b;">
            <td style="padding-left: 30px;">└─ ${drItData.count} DR rattachée(s)</td>
            <td class="number">${formatNumber(drItData.postes_fixes)}</td>
            <td class="number">${formatNumber(drItData.portables)}</td>
            <td class="number">${formatMilliers(drItData.budget_annee)} k€</td>
            <td class="number">${formatMilliers(drItData.budget_moyen_4ans)} k€</td>
            <td class="number">${formatEuro(dr_cout_par_agent)}</td>
            <td class="number">${formatEuro(dr_cout_par_agent_lisse)}</td>
          </tr>
            `;
          }
        }
        
        return rowHTML;
      }).join('');
      
      const total_cout_par_agent = total_effectif > 0 ? (total_budget / total_effectif) : 0;
      const total_cout_par_agent_lisse = total_effectif > 0 ? (total_budget_4ans / total_effectif) : 0;
      
      return `
        <div class="section">
          <div class="section-header">
            <div class="section-icon bg-it">💻</div>
            <h2>Informatique</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Structure</th>
                <th class="number">Postes Fixes</th>
                <th class="number">Portables</th>
                <th class="number">Budget</th>
                <th class="number">Budget Moyen 4 ans</th>
                <th class="number">Coût / Agent</th>
                <th class="number">Coût / Agent Lissé</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
              <tr style="font-weight: bold; background: #f8fafc; border-top: 2px solid #cbd5e1;">
                <td>TOTAL</td>
                <td class="number">${formatNumber(total_fixes)}</td>
                <td class="number">${formatNumber(total_portables)}</td>
                <td class="number">${formatMilliers(total_budget)} k€</td>
                <td class="number">${formatMilliers(total_budget_4ans)} k€</td>
                <td class="number">${formatEuro(total_cout_par_agent)}</td>
                <td class="number">${formatEuro(total_cout_par_agent_lisse)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function render() {
      const content = document.getElementById('content');
      content.innerHTML = `
        ${renderRHSection()}
        ${renderVehiculesSection()}
        ${renderFraisMissionSection()}
        ${renderInformatiqueSection()}
      `;
      content.style.display = 'block';
    }

    async function init() {
      try {
        await grist.ready();
        await loadAllData();
        
        if (!FICHE_STATE.data.consolidation) {
          throw new Error('Table Consolidation non disponible');
        }
        
        ANNEE = getDerniereAnnee();
        
        // Mettre à jour l'année dans le header
        const headerP = document.querySelector('.header-content p');
        if (headerP) {
          headerP.textContent = `Direction Générale des Douanes et Droits Indirects • Synthèse ${ANNEE}`;
        }
        
        render();
        document.getElementById('loading').style.display = 'none';
        
      } catch (error) {
        console.error('Erreur initialisation:', error);
        document.getElementById('loading').innerHTML = 
          `<div class="error">Erreur de chargement : ${error.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
