<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
body { font-family: Arial; padding: 10px; }
button { padding: 8px 14px; margin-right: 10px; }
#log { white-space: pre-wrap; background: #eee; padding: 10px; height: 250px; overflow-y: auto; }
</style>
</head>

<body>

<h3>Validation BAN (Document Widget)</h3>

<button id="one">Valider ligne sélectionnée</button>
<button id="all">Valider toutes les lignes</button>

<div id="log"></div>

<script>
let current = null;
let tableName = null;

// --- Initialisation ---
grist.ready({
  requiredAccess: 'full'
});

// Ligne sélectionnée
grist.onRecord(rec => current = rec);

// Nom de la table
grist.onSettings(settings => {
  tableName = settings.tableId;
});

// Logging
function log(msg) {
  const box = document.getElementById("log");
  box.textContent += msg + "\n";
  box.scrollTop = box.scrollHeight;
}

// Nettoyage
function clean(addr) {
  if (!addr) return "";
  return addr.replace(/\s+/g, " ")
             .replace(/BP\s*\d+/gi, "")
             .replace(/CS\s*\d+/gi, "")
             .replace(/CEDEX/gi, "")
             .trim();
}

// CP étranger
function isForeign(addr) {
  const m = addr.match(/\b(\d{5})\b/);
  if (!m) return false;
  return parseInt(m[1], 10) >= 99000;
}

// Appel BAN
async function callBAN(q) {
  const url = "https://api-adresse.data.gouv.fr/search/?q=" + encodeURIComponent(q) + "&limit=1";
  const r = await fetch(url);
  if (!r.ok) return null;
  const data = await r.json();
  return data.features?.[0] || null;
}

// Mise à jour Grist
async function updateRow(id, values) {
  await grist.doc.updateRecords(tableName, [{ id, ...values }]);
}

// Traitement d'une ligne
async function processRow(row) {
  const id = row.id;
  const addr = row.AdresseBrute || row.AdresseNormalisee;

  if (!addr) {
    await updateRow(id, { BAN_Commentaire: "Adresse vide" });
    return;
  }

  const cleaned = clean(addr);

  if (isForeign(cleaned)) {
    await updateRow(id, {
      BAN_Adresse: null,
      BAN_Score: null,
      BAN_CodeINSEE: null,
      BAN_Lat: null,
      BAN_Lon: null,
      BAN_Commentaire: "CP étranger"
    });
    return;
  }

  const f = await callBAN(cleaned);

  if (!f) {
    await updateRow(id, {
      BAN_Adresse: null,
      BAN_Score: null,
      BAN_CodeINSEE: null,
      BAN_Lat: null,
      BAN_Lon: null,
      BAN_Commentaire: "Aucun résultat BAN"
    });
    return;
  }

  const p = f.properties;
  const g = f.geometry;

  await updateRow(id, {
    BAN_Adresse: p.label,
    BAN_Score: p.score,
    BAN_CodeINSEE: p.citycode,
    BAN_Lat: g.coordinates[1],
    BAN_Lon: g.coordinates[0],
    BAN_Commentaire: p.score >= 0.85 ? "OK" : "Score faible"
  });
}

// Bouton : ligne sélectionnée
document.getElementById("one").onclick = async () => {
  if (!current) return log("Aucune ligne sélectionnée.");
  log("Traitement ligne " + current.id);
  await processRow(current);
  log("OK.");
};

// Bouton : toutes les lignes
document.getElementById("all").onclick = async () => {
  log("Chargement table…");
  const table = await grist.doc.fetchTable(tableName);
  const rows = table.records;

  log("Nombre de lignes : " + rows.length);

  for (const row of rows) {
    log("→ Ligne " + row.id);
    await processRow(row);
  }

  log("Terminé.");
};
</script>

</body>
</html>
