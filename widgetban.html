<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Validation BAN</title>

<!-- SDK Grist obligatoire -->
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 12px;
  }
  button {
    padding: 10px 16px;
    background: #0053b3;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 15px;
    margin-right: 10px;
  }
  button:hover {
    background: #003f87;
  }
  #log {
    margin-top: 15px;
    font-size: 13px;
    white-space: pre-wrap;
    background: #f5f5f5;
    padding: 10px;
    border-radius: 4px;
    height: 300px;
    overflow-y: auto;
  }
</style>
</head>

<body>

<h2>Validation BAN</h2>
<p>Valide l’adresse de la ligne sélectionnée ou de toutes les lignes via l’API BAN.</p>

<button id="btn">Valider la ligne sélectionnée</button>
<button id="btnAll">Valider toutes les lignes</button>

<div id="log"></div>

<script>
// Connexion Grist
grist.ready({
  requiredAccess: 'full',
  columns: [
    "AdresseBrute",
    "AdresseNormalisee",
    "BAN_Adresse",
    "BAN_Score",
    "BAN_CodeINSEE",
    "BAN_Lat",
    "BAN_Lon",
    "BAN_Commentaire"
  ]
});

grist.onRecord((record) => {
  window.currentRecord = record;
});

// Logging
function log(msg) {
  const box = document.getElementById("log");
  box.textContent += msg + "\n";
  box.scrollTop = box.scrollHeight;
}

// Nettoyage minimal avant BAN
function cleanAddress(addr) {
  if (!addr) return "";
  return addr
    .replace(/\s+/g, " ")
    .replace(/BP\s*\d+/gi, "")
    .replace(/CS\s*\d+/gi, "")
    .replace(/CEDEX/gi, "")
    .trim();
}

// Détection CP étranger (99xxx)
function isForeignCP(addr) {
  const m = addr.match(/\b(\d{5})\b/);
  if (!m) return false;
  const cp = parseInt(m[1], 10);
  return cp >= 99000;
}

// Appel API BAN
async function callBAN(query) {
  const url = "https://api-adresse.data.gouv.fr/search/?q=" +
              encodeURIComponent(query) +
              "&limit=1";

  const r = await fetch(url);
  if (!r.ok) return null;

  const data = await r.json();
  if (!data.features || data.features.length === 0) return null;

  return data.features[0];
}

// Mise à jour Grist
async function updateGrist(rowId, values) {
  await grist.doc.updateRecords("Table1", [
    { id: rowId, ...values }
  ]);
}

// === Traitement ligne sélectionnée ===
document.getElementById("btn").onclick = async () => {
  const rec = window.currentRecord;
  if (!rec) {
    log("❌ Aucune ligne sélectionnée.");
    return;
  }

  const addr = rec.AdresseBrute || rec.AdresseNormalisee;
  log("Adresse brute : " + addr);

  const cleaned = cleanAddress(addr);
  log("Adresse nettoyée : " + cleaned);

  if (isForeignCP(cleaned)) {
    log("❌ CP étranger détecté : BAN ignoré.");
    await updateGrist(rec.id, {
      BAN_Adresse: null,
      BAN_Score: null,
      BAN_CodeINSEE: null,
      BAN_Lat: null,
      BAN_Lon: null,
      BAN_Commentaire: "CP étranger : BAN non applicable"
    });
    return;
  }

  const feature = await callBAN(cleaned);

  if (!feature) {
    log("❌ Aucun résultat BAN.");
    await updateGrist(rec.id, {
      BAN_Adresse: null,
      BAN_Score: null,
      BAN_CodeINSEE: null,
      BAN_Lat: null,
      BAN_Lon: null,
      BAN_Commentaire: "Aucun résultat BAN"
    });
    return;
  }

  const p = feature.properties;
  const g = feature.geometry;

  log("✔ BAN trouvé : " + p.label);
  log("Score : " + p.score);

  await updateGrist(rec.id, {
    BAN_Adresse: p.label,
    BAN_Score: p.score,
    BAN_CodeINSEE: p.citycode || null,
    BAN_Lat: g.coordinates[1],
    BAN_Lon: g.coordinates[0],
    BAN_Commentaire: p.score >= 0.85 ? "OK" : "Score faible"
  });
};

// === Traitement en lot : toutes les lignes ===
document.getElementById("btnAll").onclick = async () => {
  log("=== Traitement de toutes les lignes ===");

  const table = await grist.doc.fetchTable("Table1");
  const rows = table.records;

  log("Nombre de lignes : " + rows.length);

  for (const row of rows) {
    const id = row.id;
    const addr = row.AdresseBrute || row.AdresseNormalisee;

    if (!addr) {
      await updateGrist(id, {
        BAN_Adresse: null,
        BAN_Score: null,
        BAN_CodeINSEE: null,
        BAN_Lat: null,
        BAN_Lon: null,
        BAN_Commentaire: "Adresse vide"
      });
      continue;
    }

    const cleaned = cleanAddress(addr);

    if (isForeignCP(cleaned)) {
      await updateGrist(id, {
        BAN_Adresse: null,
        BAN_Score: null,
        BAN_CodeINSEE: null,
        BAN_Lat: null,
        BAN_Lon: null,
        BAN_Commentaire: "CP étranger : BAN non applicable"
      });
      continue;
    }

    const feature = await callBAN(cleaned);

    if (!feature) {
      await updateGrist(id, {
        BAN_Adresse: null,
        BAN_Score: null,
        BAN_CodeINSEE: null,
        BAN_Lat: null,
        BAN_Lon: null,
        BAN_Commentaire: "Aucun résultat BAN"
      });
      continue;
    }

    const p = feature.properties;
    const g = feature.geometry;

    await updateGrist(id, {
      BAN_Adresse: p.label,
      BAN_Score: p.score,
      BAN_CodeINSEE: p.citycode || null,
      BAN_Lat: g.coordinates[1],
      BAN_Lon: g.coordinates[0],
      BAN_Commentaire: p.score >= 0.85 ? "OK" : "Score faible"
    });
  }

  log("=== Traitement terminé ===");
};
</script>

</body>
</html>
